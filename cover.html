<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>one-context 多仓AI协作天花板 封面</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #0a0a0f; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      min-height: 100vh;
    }
    .cover {
      width: 1920px;
      height: 1080px;
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #0a0a0f 0%, #0d1117 50%, #0a0a0f 100%);
    }
    .grid {
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(rgba(56, 139, 253, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(56, 139, 253, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .panel-left {
      position: absolute;
      left: 80px;
      top: 120px;
      bottom: 120px;
      width: 360px;
      background: rgba(56, 139, 253, 0.06);
      border: 1px solid rgba(56, 139, 253, 0.2);
    }
    .panel-mid {
      position: absolute;
      left: 500px;
      top: 120px;
      bottom: 120px;
      width: 280px;
      background: rgba(139, 92, 246, 0.06);
      border: 1px solid rgba(139, 92, 246, 0.2);
    }
    .panel-right {
      position: absolute;
      left: 840px;
      top: 120px;
      bottom: 120px;
      width: 1000px;
      background: rgba(34, 197, 94, 0.04);
      border: 1px solid rgba(34, 197, 94, 0.15);
    }
    .title {
      position: absolute;
      top: 380px;
      left: 50%;
      transform: translateX(-50%);
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      font-size: 140px;
      font-weight: 700;
      color: #e2e8f0;
      letter-spacing: 8px;
      text-shadow: 0 0 60px rgba(56, 139, 253, 0.3);
    }
    .subtitle {
      position: absolute;
      top: 560px;
      left: 50%;
      transform: translateX(-50%);
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      font-size: 52px;
      font-weight: 500;
      color: rgba(226, 232, 240, 0.7);
      letter-spacing: 12px;
    }
    .code-accent {
      position: absolute;
      left: 140px;
      top: 620px;
      font-family: "Consolas", "Source Code Pro", monospace;
      font-size: 22px;
      line-height: 1.8;
    }
    .code-1 { color: rgba(56, 139, 253, 0.7); }
    .code-2 { color: rgba(139, 92, 246, 0.7); }
    .code-3 { color: rgba(34, 197, 94, 0.7); }
    .line {
      position: absolute;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(56, 139, 253, 0.5), transparent);
    }
    .line-1 { top: 220px; left: 100px; right: 100px; }
    .line-2 { top: 280px; left: 520px; width: 240px; }
    .line-3 { top: 220px; left: 900px; right: 100px; }
    .corner {
      position: absolute;
      width: 80px;
      height: 80px;
      border: 2px solid rgba(56, 139, 253, 0.4);
    }
    .corner-tl { top: 40px; left: 40px; border-right: none; border-bottom: none; }
    .corner-tr { top: 40px; right: 40px; border-left: none; border-bottom: none; }
    .corner-bl { bottom: 40px; left: 40px; border-right: none; border-top: none; }
    .corner-br { bottom: 40px; right: 40px; border-left: none; border-top: none; }
    .glow {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.15;
    }
    .glow-1 { background: #388bfd; top: -100px; left: -100px; }
    .glow-2 { background: #8b5cf6; top: -50px; right: 200px; }
    .glow-3 { background: #22c55e; bottom: -150px; right: -100px; }
    .bottom-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #388bfd, #8b5cf6, #22c55e);
    }
  </style>
</head>
<body>
  <div class="cover">
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
    <div class="glow glow-3"></div>
    <div class="grid"></div>
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>
    <div class="panel-left"></div>
    <div class="panel-mid"></div>
    <div class="panel-right"></div>
    <div class="line line-1"></div>
    <div class="line line-2"></div>
    <div class="line line-3"></div>
    <div class="title">one-context</div>
    <div class="subtitle">多仓AI协作天花板</div>
    <div class="code-accent">
      <div class="code-1">const collaboration = true;</div>
      <div class="code-2">async function sync() {</div>
      <div class="code-3">  return await harmony;</div>
    </div>
    <div class="bottom-bar"></div>
  </div>
</body>
</html>
