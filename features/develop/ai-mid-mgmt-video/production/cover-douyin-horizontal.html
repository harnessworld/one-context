<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>抖音横版封面 1080×608</title>
<!--
  抖音横版视频封面常用规格：1080×608（与 16:9 一致）。
  版式与 cover-horizontal.html（2560×1440）相同，整体 scale 至抖音像素，避免维护两套文案。
-->
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 1080px;
  height: 608px;
  overflow: hidden;
  background: #05050a;
}
#douyin-scale-root {
  width: 2560px;
  height: 1440px;
  transform: scale(0.421875);
  transform-origin: 0 0;
}
#douyin-scale-root iframe {
  border: 0;
  display: block;
  width: 2560px;
  height: 1440px;
}
</style>
</head>
<body>
<div id="douyin-scale-root">
  <iframe src="cover-horizontal.html" title="cover"></iframe>
</div>
</body>
</html>
