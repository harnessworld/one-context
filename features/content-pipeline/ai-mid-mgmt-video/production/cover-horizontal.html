<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>封面·横版 1440×1080</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { width: 1440px; height: 1080px; overflow: hidden; font-family: 'Helvetica Neue', 'Microsoft YaHei', sans-serif; background: #05050a; }
#cover { position: relative; width: 1440px; height: 1080px; overflow: hidden; }
#bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
#bg-fallback { position: absolute; inset: 0; }
#overlay { position: absolute; inset: 0; background: linear-gradient(to right, rgba(3,3,8,0.42) 0%, rgba(3,3,8,0.06) 18%, rgba(3,3,8,0.02) 50%, rgba(3,3,8,0.06) 82%, rgba(3,3,8,0.42) 100%); }
#noise { position: absolute; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E"); pointer-events: none; }
#header { position: absolute; top: 0; left: 0; right: 0; padding: 48px 56px 0; display: flex; justify-content: space-between; align-items: center; z-index: 20; }
#tagline { font-size: 22px; color: rgba(255,255,255,0.55); letter-spacing: 4px; }
#brand { display: flex; align-items: center; gap: 12px; }
#brand-name { font-size: 22px; font-weight: 600; color: rgba(255,255,255,0.80); letter-spacing: 2px; }
#avatar { width: 56px; height: 56px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255,255,255,0.25); }
#avatar-fallback { width: 56px; height: 56px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.20); background: rgba(255,255,255,0.06); display: flex; align-items: center; justify-content: center; font-size: 28px; }
#content { position: absolute; top: 0; bottom: 0; left: 0; right: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 140px 80px 180px; text-align: center; z-index: 20; gap: 0; }
#tag { display: inline-block; font-size: 20px; font-weight: 600; letter-spacing: 6px; padding: 8px 24px; border-radius: 100px; margin-bottom: 36px; }
#headline { font-size: 140px; font-weight: 900; line-height: 1.0; letter-spacing: -2px; color: #ffffff; text-align: center; word-break: keep-all; }
#divider { width: 90px; height: 3px; border-radius: 2px; margin: 32px auto 32px; }
#subline { font-size: 36px; font-weight: 500; line-height: 1.55; color: rgba(255,255,255,0.75); letter-spacing: 2px; max-width: 720px; text-shadow: 0 2px 16px rgba(0,0,0,0.8); }
#footer { position: absolute; bottom: 0; left: 0; right: 0; padding: 0 56px 40px; display: flex; justify-content: space-between; align-items: center; z-index: 20; }
#footer-left { display: flex; flex-direction: column; gap: 8px; }
.foot-item { display: flex; align-items: center; gap: 10px; font-size: 20px; color: rgba(255,255,255,0.38); letter-spacing: 2px; }
.foot-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
#watermark { font-size: 18px; color: rgba(255,255,255,0.22); letter-spacing: 2px; }
#accent-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 4px; }
</style>
</head>
<body>
<div id="cover">
    <img id="bg" src="" alt="">
    <div id="bg-fallback"></div>
    <div id="overlay"></div>
    <div id="noise"></div>
    <div id="header">
        <div id="tagline">拯救你的职场</div>
        <div id="brand">
            <div id="brand-name">大厂吾师兄</div>
            <img id="avatar" src="" onerror="this.style.display='none'" alt="">
            <div id="avatar-fallback">🐶</div>
        </div>
    </div>
    <div id="content">
        <div id="tag"></div>
        <div id="headline"></div>
        <div id="divider"></div>
        <div id="subline"></div>
    </div>
    <div id="footer">
        <div id="footer-left"></div>
        <div id="watermark"></div>
    </div>
    <div id="accent-bar"></div>
</div>
<script>
const CONFIG = {
    headline:    "AI正在\n终结中层管理",
    accentLine:  2,
    subline:     "Block裁员背后：AI让靠周报的中层变得多余",
    tag:         "2026 · AI与组织",
    bgImage:     "",
    avatarImage: "",
    footerItems: ["实时数据替代信息搬运", "硅谷正在去中层化"],
    watermark:   "豆包AI生成",
    theme:       "gold",
};
const THEMES = {
    gold: {
        accent:     "#FFC107", accent2:    "#FF8F00",
        tagBg:      "rgba(255,193,7,0.14)", tagBorder:  "rgba(255,213,79,0.55)", tagColor:   "#FFE082",
        glowColor:  "rgba(255,193,7,0.26)", glowColor2: "rgba(255,171,0,0.16)",
        dotColor:   "#FFCA28",
        bar:        "linear-gradient(90deg, transparent 2%, #FFD54F 35%, #FFB300 70%, transparent 98%)",
        textGlow:   "0 0 56px rgba(255,193,7,0.38), 0 4px 24px rgba(0,0,0,0.92)",
        accentGrad: "linear-gradient(135deg, #FFECB3 0%, #FFC107 42%, #FF8F00 100%)",
        fallbackBg: "radial-gradient(ellipse 120% 80% at 50% 28%, #1a1508 0%, #0c0a05 42%, #050508 100%)",
    },
};
(function render() {
    const t = THEMES[CONFIG.theme] || THEMES.gold;
    const bgEl = document.getElementById('bg');
    if (CONFIG.bgImage) { bgEl.src = CONFIG.bgImage; bgEl.onerror = () => { bgEl.style.display = 'none'; }; } 
    else { bgEl.style.display = 'none'; }
    document.getElementById('bg-fallback').style.background = t.fallbackBg + ', radial-gradient(ellipse 80% 60% at 50% 75%, ' + t.glowColor + ' 0%, transparent 60%), radial-gradient(ellipse 60% 60% at 80% 20%, ' + t.glowColor2 + ' 0%, transparent 60%)';
    if (CONFIG.avatarImage) { document.getElementById('avatar').src = CONFIG.avatarImage; document.getElementById('avatar-fallback').style.display = 'none'; } 
    else { document.getElementById('avatar').style.display = 'none'; }
    const tagEl = document.getElementById('tag');
    tagEl.textContent = CONFIG.tag;
    tagEl.style.cssText += 'background:' + t.tagBg + '; border:1.5px solid ' + t.tagBorder + '; color:' + t.tagColor + ';';
    const headEl = document.getElementById('headline');
    const lines = CONFIG.headline.split('\n');
    headEl.style.textShadow = t.textGlow;
    headEl.innerHTML = lines.map((line, i) => {
        if (CONFIG.accentLine === i + 1) return '<em style="background:' + t.accentGrad + '; -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;">' + line + '</em>';
        return '<span>' + line + '</span>';
    }).join('<br>');
    document.getElementById('divider').style.background = t.accentGrad;
    document.getElementById('subline').textContent = CONFIG.subline;
    const footLeft = document.getElementById('footer-left');
    (CONFIG.footerItems || []).forEach(item => {
        const div = document.createElement('div');
        div.className = 'foot-item';
        div.innerHTML = '<div class="foot-dot" style="background:' + t.dotColor + ';box-shadow:0 0 6px ' + t.dotColor + '"></div>' + item;
        footLeft.appendChild(div);
    });
    document.getElementById('watermark').textContent = CONFIG.watermark;
    document.getElementById('accent-bar').style.background = t.bar;
})();
</script>
</body>
</html>
