<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>封面</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    font-family: 'Helvetica Neue', 'Microsoft YaHei', 'PingFang SC', sans-serif;
    background: #05050a;
}

#cover {
    position: relative;
    width: 1080px;
    height: 1920px;
    overflow: hidden;
}

/* ─── 背景层 ─── */
#bg {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center 30%;
}

/* 纯CSS备用背景（无背景图时展示） */
#bg-fallback {
    position: absolute;
    inset: 0;
    /* 主色由JS动态注入 */
}

/* 暗角遮罩 - 强化文字区可读性 */
#overlay {
    position: absolute;
    inset: 0;
    z-index: 1;
    background:
        linear-gradient(to bottom,
            rgba(3,3,8,0.82) 0%,
            rgba(3,3,8,0.30) 18%,
            rgba(3,3,8,0.08) 38%,
            rgba(3,3,8,0.08) 52%,
            rgba(3,3,8,0.45) 72%,
            rgba(3,3,8,0.92) 100%
        );
}

/* 电影感噪点（在手机之下，避免压暗机身） */
#noise {
    position: absolute; inset: 0;
    z-index: 5;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
    pointer-events: none;
}

/* 手机短视频装饰：大号背景层，在遮罩之上、噪点与正文之下 */
#phone-deco {
    position: absolute;
    left: 50%;
    top: 52%;
    width: 520px;
    height: 990px;
    margin-left: -260px;
    margin-top: -495px;
    z-index: 6;
    pointer-events: none;
    opacity: 0.95;
    transform: rotate(-11deg) scale(1.72);
    transform-origin: center center;
    filter: drop-shadow(0 0 120px rgba(56, 189, 248, 0.42))
            drop-shadow(0 48px 90px rgba(0, 0, 0, 0.55));
}
#phone-deco svg {
    width: 100%;
    height: 100%;
    display: block;
}

/* ─── 顶部品牌栏 ─── */
#header {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 76px 76px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 20;
}

#tagline {
    font-size: 30px;
    font-weight: 400;
    color: rgba(255,255,255,0.55);
    letter-spacing: 6px;
}

#brand {
    display: flex;
    align-items: center;
    gap: 16px;
}

#brand-name {
    font-size: 30px;
    font-weight: 600;
    color: rgba(255,255,255,0.80);
    letter-spacing: 3px;
}

#avatar {
    width: 78px; height: 78px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid rgba(255,255,255,0.25);
    display: block;
}

#avatar-fallback {
    width: 78px; height: 78px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.20);
    background: rgba(255,255,255,0.06);
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
}

/* ─── 核心内容区（整体垂直居中偏上） ─── */
#content {
    position: absolute;
    top: 0; bottom: 0; left: 0; right: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 200px 72px 280px;
    text-align: center;
    z-index: 20;
    gap: 0;
}

/* 小标签 */
#tag {
    display: inline-block;
    font-size: 26px;
    font-weight: 600;
    letter-spacing: 8px;
    padding: 10px 32px;
    border-radius: 100px;
    margin-bottom: 52px;
    /* color & border from JS */
}

/* ── 主标题 ─── */
/* 核心规则：缩成 200px 宽的小图仍能一眼看懂 */
#headline {
    font-size: 200px;
    font-weight: 900;
    line-height: 1.0;
    letter-spacing: -4px;
    color: #ffffff;
    text-align: center;
    word-break: keep-all;
    /* text-shadow 由JS注入主题色 */
}

/* 自适应字号 — 按每行最大 CJK 视觉宽度分档 */
#headline.len5  { font-size: 200px; }                          /* maxLineW ≤4 */
#headline.len6  { font-size: 180px; }                          /* maxLineW ≤5 */
#headline.len7  { font-size: 155px; letter-spacing: -2px; }    /* maxLineW ≤6 */
#headline.len8  { font-size: 130px; letter-spacing: -1px; }    /* maxLineW ≤7 */
#headline.len10 { font-size: 110px; letter-spacing: 0px; }     /* maxLineW ≤9 */
#headline.len12 { font-size: 95px; }                           /* maxLineW ≤11 */
#headline.long  { font-size: 82px;  letter-spacing: 0px; }     /* maxLineW >11 */

/* 强调词：由JS动态wrap一个<em>标签 */
#headline em {
    font-style: normal;
    /* background-clip text 由JS注入 */
}
/* 「软件」两字分色：一眼彩色 */
#headline em.headline-sw {
    font-style: normal;
    text-shadow: none !important;
    filter: drop-shadow(0 4px 28px rgba(56, 189, 248, 0.55)) drop-shadow(0 0 40px rgba(167, 139, 250, 0.35));
}
#headline em.headline-sw .sw-a {
    background: linear-gradient(165deg, #22d3ee 0%, #38bdf8 35%, #818cf8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}
#headline em.headline-sw .sw-b {
    background: linear-gradient(165deg, #c084fc 0%, #e879f9 45%, #fbbf24 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

/* 分割线 */
#divider {
    width: 120px;
    height: 3px;
    border-radius: 2px;
    margin: 44px auto 44px;
    /* background 由JS注入 */
}

/* 副标题 */
#subline {
    font-size: 48px;
    font-weight: 500;
    line-height: 1.55;
    color: rgba(255,255,255,0.75);
    letter-spacing: 3px;
    max-width: 900px;
    text-shadow: 0 2px 20px rgba(0,0,0,0.8);
}

/* ─── 底部信息条 ─── */
#footer {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 0 76px 60px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 20;
}

#footer-left {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.foot-item {
    display: flex;
    align-items: center;
    gap: 14px;
    font-size: 27px;
    color: rgba(255,255,255,0.38);
    letter-spacing: 2px;
}

.foot-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
    /* background from JS */
}

#watermark {
    font-size: 24px;
    color: rgba(255,255,255,0.22);
    letter-spacing: 3px;
}

/* ─── 底部装饰线 ─── */
#accent-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 5px;
    /* background from JS */
}
</style>
</head>

<script>
// ════════════════════════════════════════════════════
//  每期视频只改 CONFIG 这一块
// ════════════════════════════════════════════════════
const CONFIG = {
    headline:    "重新定义\nAI时代的\n软件",
    accentLine:  3,
    subline:     "",
    tag:         "Harness · Worker · Agent 后端",
    bgImage:     "",
    avatarImage: "",
    footerItems: ["Worker", "Trigger", "Function"],
    watermark:   "",
    theme:       "tech",
};
// ════════════════════════════════════════════════════

const THEMES = {
    danger: {
        accent:     "#FF2A55",
        accent2:    "#FF8C00",
        tagBg:      "rgba(255,42,85,0.12)",
        tagBorder:  "rgba(255,42,85,0.5)",
        tagColor:   "#FF6B8A",
        glowColor:  "rgba(255,42,85,0.25)",
        glowColor2: "rgba(255,140,0,0.15)",
        dotColor:   "#FF2A55",
        bar:        "linear-gradient(90deg, transparent 2%, #FF2A55 35%, #FF8C00 70%, transparent 98%)",
        textGlow:   "0 0 80px rgba(255,42,85,0.35), 0 4px 30px rgba(0,0,0,0.9)",
        accentGrad: "linear-gradient(135deg, #FF2A55 0%, #FF8C00 100%)",
        fallbackBg: "radial-gradient(ellipse 120% 80% at 50% 30%, #1a0508 0%, #0d0305 40%, #050208 100%)",
    },
    growth: {
        accent:     "#FFD700",
        accent2:    "#00F0FF",
        tagBg:      "rgba(255,215,0,0.10)",
        tagBorder:  "rgba(255,215,0,0.45)",
        tagColor:   "#FFD700",
        glowColor:  "rgba(255,215,0,0.20)",
        glowColor2: "rgba(0,240,255,0.12)",
        dotColor:   "#FFD700",
        bar:        "linear-gradient(90deg, transparent 2%, #FFD700 35%, #00F0FF 70%, transparent 98%)",
        textGlow:   "0 0 80px rgba(255,215,0,0.30), 0 4px 30px rgba(0,0,0,0.9)",
        accentGrad: "linear-gradient(135deg, #FFD700 0%, #FFA500 100%)",
        fallbackBg: "radial-gradient(ellipse 120% 80% at 50% 30%, #150f00 0%, #0a0800 40%, #050505 100%)",
    },
    tech: {
        accent:     "#00F0FF",
        accent2:    "#8B5CF6",
        tagBg:      "rgba(0,240,255,0.08)",
        tagBorder:  "rgba(0,240,255,0.40)",
        tagColor:   "#00D4E8",
        glowColor:  "rgba(0,240,255,0.18)",
        glowColor2: "rgba(139,92,246,0.18)",
        dotColor:   "#00F0FF",
        bar:        "linear-gradient(90deg, transparent 2%, #00F0FF 35%, #8B5CF6 70%, transparent 98%)",
        textGlow:   "0 0 80px rgba(0,240,255,0.25), 0 4px 30px rgba(0,0,0,0.9)",
        accentGrad: "linear-gradient(135deg, #00F0FF 0%, #8B5CF6 100%)",
        fallbackBg: "radial-gradient(ellipse 120% 80% at 50% 30%, #03101a 0%, #020810 40%, #03050f 100%)",
    },
    finance: {
        accent:     "#FFD700",
        accent2:    "#00FF88",
        tagBg:      "rgba(255,215,0,0.10)",
        tagBorder:  "rgba(255,215,0,0.45)",
        tagColor:   "#FFD700",
        glowColor:  "rgba(255,215,0,0.18)",
        glowColor2: "rgba(0,255,136,0.15)",
        dotColor:   "#00FF88",
        bar:        "linear-gradient(90deg, transparent 2%, #FFD700 35%, #00FF88 70%, transparent 98%)",
        textGlow:   "0 0 80px rgba(255,215,0,0.28), 0 4px 30px rgba(0,0,0,0.9)",
        accentGrad: "linear-gradient(135deg, #FFD700 0%, #00FF88 100%)",
        fallbackBg: "radial-gradient(ellipse 120% 80% at 50% 30%, #0e0f00 0%, #070800 40%, #040505 100%)",
    },
    sand: {
        accent:     "#EDC9AF",
        accent2:    "#D4A574",
        tagBg:      "rgba(237,201,175,0.12)",
        tagBorder:  "rgba(237,201,175,0.45)",
        tagColor:   "#EDC9AF",
        glowColor:  "rgba(237,201,175,0.18)",
        glowColor2: "rgba(212,165,116,0.15)",
        dotColor:   "#D4A574",
        bar:        "linear-gradient(90deg, transparent 2%, #EDC9AF 35%, #D4A574 70%, transparent 98%)",
        textGlow:   "0 0 80px rgba(237,201,175,0.28), 0 4px 30px rgba(0,0,0,0.9)",
        accentGrad: "linear-gradient(135deg, #EDC9AF 0%, #D4A574 100%)",
        fallbackBg: "radial-gradient(ellipse 120% 80% at 50% 30%, #1a1208 0%, #0d0a04 40%, #050503 100%)",
    },
};

(function render() {
    const t = THEMES[CONFIG.theme] || THEMES.danger;

    // ── 背景图 ──
    const bgEl = document.getElementById('bg');
    if (CONFIG.bgImage) {
        bgEl.src = CONFIG.bgImage;
        bgEl.onerror = () => { bgEl.style.display = 'none'; };
    } else {
        bgEl.style.display = 'none';
    }

    // ── 纯CSS备用背景 ──
    document.getElementById('bg-fallback').style.background =
        t.fallbackBg + `, radial-gradient(ellipse 80% 60% at 50% 75%, ${t.glowColor} 0%, transparent 60%), radial-gradient(ellipse 60% 60% at 80% 20%, ${t.glowColor2} 0%, transparent 60%)`;

    // ── 头像 ──
    if (CONFIG.avatarImage) {
        document.getElementById('avatar').src = CONFIG.avatarImage;
        document.getElementById('avatar-fallback').style.display = 'none';
    } else {
        document.getElementById('avatar').style.display = 'none';
    }

    // ── 标签 ──
    const tagEl = document.getElementById('tag');
    tagEl.textContent = CONFIG.tag;
    tagEl.style.cssText += `background:${t.tagBg}; border:1.5px solid ${t.tagBorder}; color:${t.tagColor};`;

    // ── 主标题 ──
    const headEl = document.getElementById('headline');
    const lines = CONFIG.headline.split('\n');

    // CJK 视觉宽度：CJK/fullwidth = 1，ASCII = 0.55
    function cjkWidth(s) {
        let w = 0;
        for (const c of s) {
            w += /[\u4e00-\u9fff\u3000-\u303f\uff00-\uffef]/.test(c) ? 1 : 0.55;
        }
        return Math.round(w);
    }
    const maxLineW = Math.max(...lines.map(l => cjkWidth(l)));

    // 按每行最大视觉宽度分档，确保单行不溢出（可用宽度 936px）
    const cls = maxLineW <= 4 ? 'len5'
              : maxLineW <= 5 ? 'len6'
              : maxLineW <= 6 ? 'len7'
              : maxLineW <= 7 ? 'len8'
              : maxLineW <= 9 ? 'len10'
              : maxLineW <= 11 ? 'len12' : 'long';
    headEl.classList.add(cls);
    headEl.style.textShadow = t.textGlow;

    // 渲染行，可选高亮某行（「软件」两字拆开做多色渐变）
    headEl.innerHTML = lines.map((line, i) => {
        if (CONFIG.accentLine === i + 1) {
            if (line === '软件') {
                return '<em class="headline-sw"><span class="sw-a">软</span><span class="sw-b">件</span></em>';
            }
            return `<em style="background:${t.accentGrad}; -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;">${line}</em>`;
        }
        return `<span>${line}</span>`;
    }).join('<br>');

    // ── 分割线 ──
    document.getElementById('divider').style.background = t.accentGrad;

    // ── 副标题 ──
    document.getElementById('subline').textContent = CONFIG.subline;

    // ── 底部项目 ──
    const footLeft = document.getElementById('footer-left');
    (CONFIG.footerItems || []).forEach(item => {
        const div = document.createElement('div');
        div.className = 'foot-item';
        div.innerHTML = `<div class="foot-dot" style="background:${t.dotColor};box-shadow:0 0 6px ${t.dotColor}"></div>${item}`;
        footLeft.appendChild(div);
    });

    // ── 水印 & 底线 ──
    document.getElementById('watermark').textContent = CONFIG.watermark;
    document.getElementById('accent-bar').style.background = t.bar;
})();
</script>
</body>
</html>
