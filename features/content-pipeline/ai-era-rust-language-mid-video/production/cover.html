<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>封面 · AI 时代 Rust</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    font-family: 'Helvetica Neue', 'Microsoft YaHei', 'PingFang SC', sans-serif;
    background: #05050a;
}

#cover {
    position: relative;
    width: 1080px;
    height: 1920px;
    overflow: hidden;
}

#bg {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center 30%;
    display: none;
}

#bg-fallback {
    position: absolute;
    inset: 0;
    z-index: 0;
    pointer-events: none;
}

/* 全屏：生锈的旧语言意象（须在 bg-fallback 之上） */
#rust-mega {
    position: absolute;
    inset: 0;
    z-index: 2;
    pointer-events: none;
}
#rust-mega svg {
    width: 100%;
    height: 100%;
    display: block;
}

#overlay {
    position: absolute;
    inset: 0;
    z-index: 1;
}

#phone-deco {
    display: none !important;
}

#noise {
    position: absolute; inset: 0;
    z-index: 5;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
    pointer-events: none;
}

#header {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 76px 76px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 20;
}

#tagline {
    font-size: 30px;
    font-weight: 400;
    color: rgba(255,255,255,0.55);
    letter-spacing: 6px;
}

#brand {
    display: flex;
    align-items: center;
    gap: 16px;
}

#brand-name {
    font-size: 30px;
    font-weight: 600;
    color: rgba(255,255,255,0.80);
    letter-spacing: 3px;
}

#avatar { display: none; }

#avatar-fallback {
    width: 78px; height: 78px;
    border-radius: 50%;
    border: 2px solid rgba(206,66,43,0.45);
    background: rgba(206,66,43,0.12);
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
}

#content {
    position: absolute;
    top: 0; bottom: 0; left: 0; right: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 200px 72px 280px;
    text-align: center;
    gap: 0;
    z-index: 20;
}
#content::before {
    content: "";
    position: absolute;
    inset: -40px -20px;
    z-index: -1;
    border-radius: 24px;
    background: radial-gradient(ellipse 90% 70% at 50% 50%, rgba(10,10,11,0.42) 0%, rgba(10,10,11,0) 72%);
    pointer-events: none;
}

#headline em.rust-accent {
    font-style: normal;
    display: inline-block;
    background: linear-gradient(100deg, #fffde7 0%, #ffeb3b 16%, #ffc400 34%, #ffab00 52%, #ffd54f 72%, #fff8e1 100%);
    background-size: 160% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 18px rgba(255,213,79,.55)) drop-shadow(0 0 42px rgba(255,193,7,.22));
}

#tag.tag-gold {
    background: rgba(201,169,110,0.12) !important;
    border-color: rgba(255,213,79,0.45) !important;
    background-image: linear-gradient(90deg, rgba(255,235,59,.95), rgba(255,193,7,.88), rgba(201,169,110,.9)) !important;
    -webkit-background-clip: text !important;
    background-clip: text !important;
    -webkit-text-fill-color: transparent !important;
    color: transparent !important;
}

#tag {
    display: inline-block;
    font-size: 26px;
    font-weight: 600;
    letter-spacing: 8px;
    padding: 10px 32px;
    border-radius: 100px;
    margin-bottom: 52px;
}

#headline {
    font-size: 200px;
    font-weight: 900;
    line-height: 1.0;
    letter-spacing: -4px;
    color: #ffffff;
    text-align: center;
    word-break: keep-all;
}

#headline.len5  { font-size: 200px; }
#headline.len6  { font-size: 180px; }
#headline.len7  { font-size: 155px; letter-spacing: -2px; }
#headline.len8  { font-size: 130px; letter-spacing: -1px; }
#headline.len10 { font-size: 110px; letter-spacing: 0px; }
#headline.len12 { font-size: 95px; }
#headline.long  { font-size: 82px;  letter-spacing: 0px; }

#headline em { font-style: normal; }

#divider {
    width: 120px;
    height: 3px;
    border-radius: 2px;
    margin: 44px auto 44px;
}

#subline {
    font-size: 48px;
    font-weight: 500;
    line-height: 1.55;
    color: rgba(255,255,255,0.75);
    letter-spacing: 3px;
    max-width: 900px;
    text-shadow: 0 2px 20px rgba(0,0,0,0.8);
}

#footer {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 0 76px 60px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 20;
}

#footer-left {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.foot-item {
    display: flex;
    align-items: center;
    gap: 14px;
    font-size: 27px;
    color: rgba(255,255,255,0.38);
    letter-spacing: 2px;
}

.foot-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
}

#watermark {
    font-size: 24px;
    color: rgba(255,255,255,0.22);
    letter-spacing: 3px;
}

#accent-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 5px;
    z-index: 21;
}
</style>
</head>
<body>
<div id="cover">

    <img id="bg" src="" alt="">
    <div id="rust-mega" aria-hidden="true">
<svg viewBox="0 0 1080 1920" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="ppt-base" cx="50%" cy="35%" r="95%">
      <stop offset="0%" stop-color="#141310"/>
      <stop offset="45%" stop-color="#0a0a0b"/>
      <stop offset="100%" stop-color="#050506"/>
    </radialGradient>
    <radialGradient id="ppt-gold-a" cx="22%" cy="18%" r="42%">
      <stop offset="0%" stop-color="#c9a96e" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#c9a96e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ppt-gold-b" cx="82%" cy="72%" r="48%">
      <stop offset="0%" stop-color="#ffc400" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#ffc400" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rusted" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a8a29e"/>
      <stop offset="45%" stop-color="#6b5a4a"/>
      <stop offset="100%" stop-color="#3f342c"/>
    </linearGradient>
    <linearGradient id="rust-flake" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#92400e"/>
      <stop offset="50%" stop-color="#c9a96e"/>
      <stop offset="100%" stop-color="#57534e"/>
    </linearGradient>
    <filter id="rcrack">
      <feTurbulence type="fractalNoise" baseFrequency="0.035" numOctaves="4" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="10" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="metal">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="ppt-grain" width="90" height="90" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="18" r="1.1" fill="#c9a96e" opacity="0.14"/>
      <circle cx="48" cy="52" r="0.8" fill="#ffeb3b" opacity="0.1"/>
      <circle cx="72" cy="28" r="1.3" fill="#78716c" opacity="0.12"/>
    </pattern>
  </defs>
  <rect width="1080" height="1920" fill="url(#ppt-base)"/>
  <rect width="1080" height="1920" fill="url(#ppt-grain)"/>
  <rect width="1080" height="1920" fill="url(#ppt-gold-a)"/>
  <rect width="1080" height="1920" fill="url(#ppt-gold-b)"/>
  <g opacity="0.55">
    <rect x="-40" y="180" width="420" height="280" rx="8" fill="#292524" transform="rotate(-8 180 320)" opacity="0.7"/>
    <rect x="700" y="120" width="380" height="240" rx="8" fill="#3f342c" transform="rotate(6 890 240)" opacity="0.65"/>
    <rect x="40" y="1500" width="460" height="260" rx="8" fill="#44403c" transform="rotate(-5 270 1630)" opacity="0.6"/>
    <rect x="620" y="1580" width="400" height="220" rx="8" fill="#292524" transform="rotate(10 820 1690)" opacity="0.55"/>
  </g>
  <g opacity="0.52" filter="url(#rcrack)">
    <text x="40" y="280" fill="url(#rusted)" font-size="148" font-weight="900" font-family="Georgia,serif" transform="rotate(-14 40 280)">Java</text>
    <text x="620" y="360" fill="url(#rusted)" font-size="132" font-weight="800" font-family="Consolas,monospace" transform="rotate(10 620 360)">C++</text>
    <text x="-20" y="1180" fill="url(#rusted)" font-size="156" font-weight="800" font-family="Consolas,monospace" transform="rotate(-8 -20 1180)">Python</text>
    <text x="700" y="1320" fill="url(#rusted)" font-size="124" font-weight="700" font-family="system-ui,sans-serif" transform="rotate(12 700 1320)">Go</text>
    <text x="120" y="1780" fill="url(#rusted)" font-size="96" font-weight="700" font-family="Consolas,monospace" transform="rotate(-5 120 1780)">PHP</text>
    <text x="780" y="220" fill="url(#rusted)" font-size="88" font-weight="600" font-family="Consolas,monospace" transform="rotate(6 780 220)">Ruby</text>
    <text x="360" y="1720" fill="url(#rusted)" font-size="76" font-weight="600" font-family="Consolas,monospace" transform="rotate(3 360 1720)">JavaScript</text>
  </g>
  <g opacity="0.65" filter="url(#metal)">
    <text x="42" y="278" fill="none" stroke="url(#rust-flake)" stroke-width="2.5" font-size="148" font-weight="900" font-family="Georgia,serif" transform="rotate(-14 42 278)">Java</text>
    <text x="618" y="358" fill="none" stroke="url(#rust-flake)" stroke-width="2" font-size="132" font-weight="800" font-family="Consolas,monospace" transform="rotate(10 618 358)">C++</text>
    <text x="-18" y="1178" fill="none" stroke="url(#rust-flake)" stroke-width="2.5" font-size="156" font-weight="800" font-family="Consolas,monospace" transform="rotate(-8 -18 1178)">Python</text>
  </g>
  <g opacity="0.48" font-family="IBM Plex Mono,Consolas,monospace" font-size="26" fill="#d6d3d1">
    <text x="48" y="520">public static void main()</text>
    <text x="48" y="556">{ /* legacy JVM */ }</text>
    <text x="560" y="1080">def train(): pass</text>
    <text x="560" y="1116"># deprecated stack</text>
    <text x="88" y="1420">import legacy;</text>
    <text x="88" y="1456">// memory unsafe</text>
    <text x="520" y="1680">package main</text>
  </g>
  <g opacity="0.7">
    <ellipse cx="220" cy="440" rx="160" ry="100" fill="#78350f" opacity="0.45"/>
    <ellipse cx="900" cy="900" rx="200" ry="120" fill="#92400e" opacity="0.38"/>
    <ellipse cx="480" cy="1620" rx="180" ry="95" fill="#57534e" opacity="0.42"/>
    <path d="M140 920 Q220 860 340 900 T500 940" fill="none" stroke="#c9a96e" stroke-width="4" opacity="0.35"/>
    <path d="M760 640 Q840 600 940 660 T1040 720" fill="none" stroke="#a16207" stroke-width="3" opacity="0.4"/>
  </g>
</svg>
    </div>
    <div id="bg-fallback"></div>
    <div id="overlay"></div>

    <div id="phone-deco" aria-hidden="true"></div>

    <div id="noise"></div>

    <div id="header">
        <div id="tagline"></div>
        <div id="brand">
            <div id="brand-name"></div>
            <img id="avatar" src="" alt="">
            <div id="avatar-fallback"></div>
        </div>
    </div>

    <div id="content">
        <div id="tag"></div>
        <div id="headline"></div>
        <div id="divider"></div>
        <div id="subline"></div>
    </div>

    <div id="footer">
        <div id="footer-left"></div>
        <div id="watermark"></div>
    </div>
    <div id="accent-bar"></div>
</div>

<script>
const CONFIG = {
    headline:    "AI 时代\nRust 香在哪",
    accentLine:  2,
    subline:     "大厂推理栈 · 混合栈 · 用信源说话",
    tag:         "2026 · 中视频深扒",
    bgImage:     "",
    avatarImage: "",
    avatarEmoji: "🦀",
    brandName:   "大厂吾师兄",
    tagline:     "硬技术 · 推理栈",
    footerItems: ["推理热路径", "内存安全", "混合栈"],
    watermark:   "rust · inference",

    theme:       "ppt",
    hideDeco:    true,

    overlayDirection: "to-bottom",
    noiseEnabled: true,
    noiseOpacity: 0.06,
};

const THEMES = {
    ppt: {
        accent:     "#c9a96e",
        accent2:    "#ffc400",
        tagGold:    true,
        tagBg:      "rgba(201,169,110,0.12)",
        tagBorder:  "rgba(255,213,79,0.45)",
        tagColor:   "#ffd54f",
        glowColor:  "rgba(201,169,110,0.28)",
        glowColor2: "rgba(255,193,7,0.12)",
        dotColor:   "#ffc400",
        bar:        "linear-gradient(90deg, transparent 2%, #ffeb3b 25%, #ffc400 50%, #c9a96e 75%, transparent 98%)",
        textGlow:   "0 0 80px rgba(255,193,7,0.28), 0 4px 30px rgba(0,0,0,0.9)",
        accentGrad: "linear-gradient(100deg, #fffde7 0%, #ffeb3b 16%, #ffc400 34%, #ffab00 52%, #ffd54f 72%, #fff8e1 100%)",
        fallbackBg: "radial-gradient(ellipse 120% 80% at 50% 30%, #141310 0%, #0a0a0b 45%, #050506 100%)",
        decoGlow:   "rgba(201,169,110,0.28)",
        decoAccent: "rgba(255,213,79,0.22)",
    },
    rust: {
        accent:     "#F97316",
        accent2:    "#00F0FF",
        tagBg:      "rgba(206,66,43,0.14)",
        tagBorder:  "rgba(249,115,22,0.55)",
        tagColor:   "#FDBA74",
        glowColor:  "rgba(206,66,43,0.22)",
        glowColor2: "rgba(0,240,255,0.12)",
        dotColor:   "#F97316",
        bar:        "linear-gradient(90deg, transparent 2%, #CE422B 30%, #00F0FF 65%, transparent 98%)",
        textGlow:   "0 0 80px rgba(206,66,43,0.35), 0 4px 30px rgba(0,0,0,0.9)",
        accentGrad: "linear-gradient(135deg, #F97316 0%, #CE422B 45%, #00F0FF 100%)",
        fallbackBg: "radial-gradient(ellipse 120% 80% at 50% 30%, #1a0e08 0%, #0d0805 40%, #030205 100%)",
        decoGlow:   "rgba(206,66,43,0.28)",
        decoAccent: "rgba(0,240,255,0.22)",
    },
    tech: {
        accent:     "#00F0FF",
        accent2:    "#8B5CF6",
        tagBg:      "rgba(0,240,255,0.08)",
        tagBorder:  "rgba(0,240,255,0.40)",
        tagColor:   "#00D4E8",
        glowColor:  "rgba(0,240,255,0.18)",
        glowColor2: "rgba(139,92,246,0.18)",
        dotColor:   "#00F0FF",
        bar:        "linear-gradient(90deg, transparent 2%, #00F0FF 35%, #8B5CF6 70%, transparent 98%)",
        textGlow:   "0 0 80px rgba(0,240,255,0.25), 0 4px 30px rgba(0,0,0,0.9)",
        accentGrad: "linear-gradient(135deg, #00F0FF 0%, #8B5CF6 100%)",
        fallbackBg: "radial-gradient(ellipse 120% 80% at 50% 30%, #03101a 0%, #020810 40%, #03050f 100%)",
        decoGlow:   "rgba(0,240,255,0.28)",
        decoAccent: "rgba(139,92,246,0.35)",
    },
};

const OVERLAYS = {
    "to-bottom": `linear-gradient(to bottom,
        rgba(10,10,11,0.72) 0%,
        rgba(10,10,11,0.22) 14%,
        rgba(10,10,11,0.05) 38%,
        rgba(10,10,11,0.05) 55%,
        rgba(10,10,11,0.28) 72%,
        rgba(10,10,11,0.85) 100%)`,
};

(function render() {
    const t = THEMES[CONFIG.theme] || THEMES.ppt;

    const megaSvg = document.querySelector('#rust-mega svg');
    document.getElementById('bg-fallback').style.background = megaSvg
        ? `radial-gradient(ellipse 70% 50% at 50% 42%, ${t.glowColor} 0%, transparent 55%)`
        : t.fallbackBg + `, radial-gradient(ellipse 70% 50% at 50% 42%, ${t.glowColor} 0%, transparent 55%)`;

    document.getElementById('overlay').style.background =
        OVERLAYS[CONFIG.overlayDirection] || OVERLAYS['to-bottom'];

    const noiseEl = document.getElementById('noise');
    noiseEl.style.opacity = CONFIG.noiseOpacity != null ? CONFIG.noiseOpacity : 0.06;

    document.getElementById('avatar-fallback').textContent = CONFIG.avatarEmoji || '🦀';
    document.getElementById('tagline').textContent = CONFIG.tagline;
    document.getElementById('brand-name').textContent = CONFIG.brandName;

    const tagEl = document.getElementById('tag');
    tagEl.textContent = CONFIG.tag;
    tagEl.style.cssText += `background:${t.tagBg}; border:1.5px solid ${t.tagBorder}; color:${t.tagColor};`;
    if (t.tagGold) tagEl.classList.add('tag-gold');

    const headEl = document.getElementById('headline');
    const lines = CONFIG.headline.split('\n');
    function cjkWidth(s) {
        let w = 0;
        for (const c of s) {
            w += /[\u4e00-\u9fff\u3000-\u303f\uff00-\uffef]/.test(c) ? 1 : 0.55;
        }
        return Math.round(w);
    }
    const maxLineW = Math.max(...lines.map(l => cjkWidth(l)));
    const cls = maxLineW <= 4 ? 'len5'
              : maxLineW <= 5 ? 'len6'
              : maxLineW <= 6 ? 'len7'
              : maxLineW <= 7 ? 'len8'
              : maxLineW <= 9 ? 'len10'
              : maxLineW <= 11 ? 'len12' : 'long';
    headEl.classList.add(cls);
    headEl.style.textShadow = t.textGlow;
    headEl.innerHTML = lines.map((line, i) => {
        if (CONFIG.accentLine === i + 1) {
            return `<em class="rust-accent">${line}</em>`;
        }
        return `<span>${line}</span>`;
    }).join('<br>');

    document.getElementById('divider').style.background = t.accentGrad;
    document.getElementById('subline').textContent = CONFIG.subline;

    const footLeft = document.getElementById('footer-left');
    (CONFIG.footerItems || []).forEach(item => {
        const div = document.createElement('div');
        div.className = 'foot-item';
        div.innerHTML = `<div class="foot-dot" style="background:${t.dotColor};box-shadow:0 0 6px ${t.dotColor}"></div>${item}`;
        footLeft.appendChild(div);
    });

    document.getElementById('watermark').textContent = CONFIG.watermark;
    document.getElementById('accent-bar').style.background = t.bar;
})();
</script>
</body>
</html>
