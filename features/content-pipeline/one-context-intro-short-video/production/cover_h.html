<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>横向封面</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    width: 1440px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Helvetica Neue', 'Microsoft YaHei', 'PingFang SC', sans-serif;
    background: #05050a;
}

#cover {
    position: relative;
    width: 1440px;
    height: 1080px;
    overflow: hidden;
}

#bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: center; }
#bg-fallback { position: absolute; inset: 0; }
#overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to right,
        rgba(3,3,8,0.85) 0%, rgba(3,3,8,0.30) 25%, rgba(3,3,8,0.10) 50%,
        rgba(3,3,8,0.30) 75%, rgba(3,3,8,0.85) 100%);
}
#noise {
    position: absolute; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
    pointer-events: none;
}

#header {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 50px 60px 0;
    display: flex; justify-content: space-between; align-items: center;
    z-index: 20;
}
#tagline { font-size: 22px; font-weight: 400; color: rgba(255,255,255,0.55); letter-spacing: 5px; }
#brand { display: flex; align-items: center; gap: 14px; }
#brand-name { font-size: 22px; font-weight: 600; color: rgba(255,255,255,0.80); letter-spacing: 3px; }
#avatar { width: 56px; height: 56px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255,255,255,0.25); }
#avatar-fallback {
    width: 56px; height: 56px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.20);
    background: rgba(255,255,255,0.06); display: flex; align-items: center; justify-content: center; font-size: 26px;
}

#content {
    position: absolute; top: 0; bottom: 0; left: 0; right: 0;
    display: flex; flex-direction: row; justify-content: center; align-items: center;
    padding: 120px 72px 100px; z-index: 20; gap: 48px;
}
#left-col { flex: 1; display: flex; flex-direction: column; gap: 0; }
#tag {
    display: inline-block; font-size: 18px; font-weight: 600; letter-spacing: 6px;
    padding: 8px 24px; border-radius: 100px; margin-bottom: 36px; align-self: flex-start;
}
#headline {
    font-size: 180px; font-weight: 900; line-height: 1.05; letter-spacing: -2px;
    color: #ffffff; word-break: keep-all; margin-bottom: 32px;
}
#headline.len8  { font-size: 120px; }
#headline.len10 { font-size: 100px; letter-spacing: 0px; }
#headline.len12 { font-size: 86px; }
#headline.long  { font-size: 70px; }
#headline em { font-style: normal; }
#divider { width: 90px; height: 3px; border-radius: 2px; margin-bottom: 32px; }
#subline {
    font-size: 48px; font-weight: 500; line-height: 1.5; color: rgba(255,255,255,0.75);
    letter-spacing: 2px; max-width: 800px;
}
#right-col { display: flex; flex-direction: column; gap: 16px; min-width: 420px; }
.info-card {
    background: rgba(255,255,255,0.04); backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 16px;
    padding: 24px 28px; display: flex; align-items: center; gap: 18px;
}
.info-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.info-text { font-size: 24px; color: rgba(255,255,255,0.70); letter-spacing: 1px; line-height: 1.4; }

#footer {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 0 60px 40px; display: flex; justify-content: flex-end; z-index: 20;
}
#watermark { font-size: 18px; color: rgba(255,255,255,0.22); letter-spacing: 3px; }
#accent-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 5px; }

/* 装饰性光晕 */
#glow-orb-1 {
    position: absolute; width: 400px; height: 400px; border-radius: 50%;
    background: radial-gradient(circle, rgba(96,165,250,0.15), transparent 70%);
    top: -100px; left: 10%; filter: blur(40px);
}
#glow-orb-2 {
    position: absolute; width: 300px; height: 300px; border-radius: 50%;
    background: radial-gradient(circle, rgba(139,92,246,0.12), transparent 70%);
    bottom: -50px; right: 15%; filter: blur(40px);
}
#glow-orb-3 {
    position: absolute; width: 200px; height: 200px; border-radius: 50%;
    background: radial-gradient(circle, rgba(52,211,153,0.1), transparent 70%);
    top: 30%; right: 25%; filter: blur(30px);
}
</style>
</head>
<body>
<div id="cover">
    <div id="glow-orb-1"></div>
    <div id="glow-orb-2"></div>
    <div id="glow-orb-3"></div>
    <img id="bg" src="" alt="">
    <div id="bg-fallback"></div>
    <div id="overlay"></div>
    <div id="noise"></div>
    <div id="header">
        <div id="tagline">拯救你的职场</div>
        <div id="brand">
            <div id="brand-name">大厂吾师兄</div>
            <img id="avatar" src="" onerror="this.style.display='none'" alt="">
            <div id="avatar-fallback">🐶</div>
        </div>
    </div>
    <div id="content">
        <div id="left-col">
            <div id="tag"></div>
            <div id="headline"></div>
            <div id="divider"></div>
            <div id="subline"></div>
        </div>
        <div id="right-col"></div>
    </div>
    <div id="footer"><div id="watermark"></div></div>
    <div id="accent-bar"></div>
</div>

<script>
// ════════════════════════════════════════════════════
//  横向封面：每期只改 CONFIG（1920×1080，B站/抖音横屏）
// ════════════════════════════════════════════════════
const CONFIG = {
    headline:    "one-context 多仓AI协作天花板",
    accentWord:  "one-context",
    subline:     "重新定义多人协作的开发体验",
    tag:         "2026 · 技术分享",
    bgImage:     "",
    avatarImage: "",
    infoItems:   ["多端适配", "跨仓Workspace", "6角色产物", "知识层校验", "轻依赖本地"],
    watermark:   "",
    theme:       "onecontext",
};
// ════════════════════════════════════════════════════

const THEMES = {
    onecontext: {
        accent:     "#60A5FA",
        accent2:    "#8B5CF6",
        tagBg:      "rgba(96,165,250,0.12)",
        tagBorder:  "rgba(96,165,250,0.5)",
        tagColor:   "#60A5FA",
        glowColor:  "rgba(96,165,250,0.25)",
        glowColor2: "rgba(139,92,246,0.15)",
        dotColor:   "#60A5FA",
        bar:        "linear-gradient(90deg, transparent 2%, #60A5FA 35%, #8B5CF6 70%, #34D399 85%, transparent 98%)",
        textGlow:   "0 0 80px rgba(96,165,250,0.35), 0 4px 30px rgba(0,0,0,0.9)",
        accentGrad: "linear-gradient(135deg, #60A5FA 0%, #818CF8 30%, #C084FC 55%, #34D399 78%, #FBBF24 100%)",
        fallbackBg: "radial-gradient(ellipse 120% 80% at 50% 30%, #0a1628 0%, #030712 40%, #050210 100%)",
    },
    tech: {
        accent: "#00F0FF", accent2: "#8B5CF6",
        tagBg: "rgba(0,240,255,0.08)", tagBorder: "rgba(0,240,255,0.40)", tagColor: "#00D4E8",
        glowColor: "rgba(0,240,255,0.18)", glowColor2: "rgba(139,92,246,0.18)", dotColor: "#00F0FF",
        bar: "linear-gradient(90deg, transparent 2%, #00F0FF 35%, #8B5CF6 70%, transparent 98%)",
        textGlow: "0 0 60px rgba(0,240,255,0.25), 0 3px 20px rgba(0,0,0,0.9)",
        accentGrad: "linear-gradient(135deg, #00F0FF 0%, #8B5CF6 100%)",
        fallbackBg: "radial-gradient(ellipse 100% 70% at 30% 50%, #03101a 0%, #020810 40%, #03050f 100%)",
    },
    danger: {
        accent: "#FF2A55", accent2: "#FF8C00",
        tagBg: "rgba(255,42,85,0.12)", tagBorder: "rgba(255,42,85,0.5)", tagColor: "#FF6B8A",
        glowColor: "rgba(255,42,85,0.25)", glowColor2: "rgba(255,140,0,0.15)", dotColor: "#FF2A55",
        bar: "linear-gradient(90deg, transparent 2%, #FF2A55 35%, #FF8C00 70%, transparent 98%)",
        textGlow: "0 0 60px rgba(255,42,85,0.35), 0 3px 20px rgba(0,0,0,0.9)",
        accentGrad: "linear-gradient(135deg, #FF2A55 0%, #FF8C00 100%)",
        fallbackBg: "radial-gradient(ellipse 100% 70% at 30% 50%, #1a0508 0%, #0d0305 40%, #050208 100%)",
    },
    growth: {
        accent: "#FFD700", accent2: "#00F0FF",
        tagBg: "rgba(255,215,0,0.10)", tagBorder: "rgba(255,215,0,0.45)", tagColor: "#FFD700",
        glowColor: "rgba(255,215,0,0.20)", glowColor2: "rgba(0,240,255,0.12)", dotColor: "#FFD700",
        bar: "linear-gradient(90deg, transparent 2%, #FFD700 35%, #00F0FF 70%, transparent 98%)",
        textGlow: "0 0 60px rgba(255,215,0,0.30), 0 3px 20px rgba(0,0,0,0.9)",
        accentGrad: "linear-gradient(135deg, #FFD700 0%, #FFA500 100%)",
        fallbackBg: "radial-gradient(ellipse 100% 70% at 30% 50%, #150f00 0%, #0a0800 40%, #050505 100%)",
    },
    finance: {
        accent: "#FFD700", accent2: "#00FF88",
        tagBg: "rgba(255,215,0,0.10)", tagBorder: "rgba(255,215,0,0.45)", tagColor: "#FFD700",
        glowColor: "rgba(255,215,0,0.18)", glowColor2: "rgba(0,255,136,0.15)", dotColor: "#00FF88",
        bar: "linear-gradient(90deg, transparent 2%, #FFD700 35%, #00FF88 70%, transparent 98%)",
        textGlow: "0 0 60px rgba(255,215,0,0.28), 0 3px 20px rgba(0,0,0,0.9)",
        accentGrad: "linear-gradient(135deg, #FFD700 0%, #00FF88 100%)",
        fallbackBg: "radial-gradient(ellipse 100% 70% at 30% 50%, #0e0f00 0%, #070800 40%, #040505 100%)",
    },
};

(function render() {
    const t = THEMES[CONFIG.theme] || THEMES.tech;
    const bgEl = document.getElementById('bg');
    if (CONFIG.bgImage) {
        bgEl.src = CONFIG.bgImage;
        bgEl.onerror = () => { bgEl.style.display = 'none'; };
    } else { bgEl.style.display = 'none'; }
    document.getElementById('bg-fallback').style.background =
        t.fallbackBg + `, radial-gradient(ellipse 60% 70% at 70% 50%, ${t.glowColor} 0%, transparent 60%), radial-gradient(ellipse 50% 60% at 20% 30%, ${t.glowColor2} 0%, transparent 60%)`;
    if (CONFIG.avatarImage) {
        document.getElementById('avatar').src = CONFIG.avatarImage;
        document.getElementById('avatar-fallback').style.display = 'none';
    } else { document.getElementById('avatar').style.display = 'none'; }
    const tagEl = document.getElementById('tag');
    tagEl.textContent = CONFIG.tag;
    tagEl.style.cssText += `background:${t.tagBg}; border:1.5px solid ${t.tagBorder}; color:${t.tagColor};`;
    const headEl = document.getElementById('headline');
    const totalChars = CONFIG.headline.length;
    const cls = totalChars <= 7 ? '' : totalChars <= 9 ? 'len8' : totalChars <= 11 ? 'len10' : totalChars <= 13 ? 'len12' : 'long';
    if (cls) headEl.classList.add(cls);
    headEl.style.textShadow = t.textGlow;
    if (CONFIG.accentWord && CONFIG.headline.includes(CONFIG.accentWord)) {
        headEl.innerHTML = CONFIG.headline.replace(
            CONFIG.accentWord,
            `<em style="background:${t.accentGrad}; -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;">${CONFIG.accentWord}</em>`
        );
    } else { headEl.textContent = CONFIG.headline; }
    document.getElementById('divider').style.background = t.accentGrad;
    document.getElementById('subline').textContent = CONFIG.subline;
    const rightCol = document.getElementById('right-col');
    (CONFIG.infoItems || []).forEach(item => {
        const card = document.createElement('div');
        card.className = 'info-card';
        card.innerHTML = `<div class="info-dot" style="background:${t.dotColor};box-shadow:0 0 8px ${t.dotColor}"></div><div class="info-text">${item}</div>`;
        rightCol.appendChild(card);
    });
    const wEl = document.getElementById('watermark');
    if (CONFIG.watermark) {
        wEl.textContent = CONFIG.watermark;
        wEl.style.display = '';
    } else {
        wEl.style.display = 'none';
    }
    document.getElementById('accent-bar').style.background = t.bar;
})();
</script>
</body>
</html>
