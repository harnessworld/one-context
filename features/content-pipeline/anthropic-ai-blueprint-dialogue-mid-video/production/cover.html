<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>封面</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    font-family: 'Helvetica Neue', 'Microsoft YaHei', 'PingFang SC', sans-serif;
    background: #020812;
}

#cover {
    position: relative;
    width: 1080px;
    height: 1920px;
    overflow: hidden;
}

/* ─── 背景层 ─── */
#bg {
    position: absolute;
    inset: 0;
    z-index: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center 30%;
}

/* 纯CSS备用背景（无背景图时展示） */
#bg-fallback {
    position: absolute;
    inset: 0;
    z-index: 0;
}

/* ─── 3D 蓝图层（透视网格 + 线框） ─── */
#blueprint-bg {
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    overflow: hidden;
}
.blueprint-floor {
    position: absolute;
    bottom: -10%;
    left: -75%;
    width: 250%;
    height: 68%;
    transform-origin: 50% 0%;
    transform: perspective(560px) rotateX(58deg);
    background-image:
        linear-gradient(0deg, rgba(120, 245, 255, 0.11) 1px, transparent 1px),
        linear-gradient(90deg, rgba(100, 220, 255, 0.07) 1px, transparent 1px),
        linear-gradient(0deg, rgba(0, 238, 255, 0.28) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 220, 255, 0.18) 1px, transparent 1px);
    background-size: 36px 36px, 36px 36px, 180px 180px, 180px 180px;
    mask-image: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.2) 18%, rgba(0,0,0,0.95) 52%);
    -webkit-mask-image: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.2) 18%, rgba(0,0,0,0.95) 52%);
}
.blueprint-floor::after {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 70% 55% at 50% 0%, rgba(160, 250, 255, 0.08), transparent 65%);
}
/* 顶部柔和青光，压低噪点感 */
.blueprint-aurora {
    position: absolute;
    inset: 0;
    background:
        radial-gradient(ellipse 90% 55% at 50% -5%, rgba(0, 210, 255, 0.09), transparent 55%),
        radial-gradient(ellipse 70% 40% at 85% 25%, rgba(56, 189, 248, 0.045), transparent 50%);
    pointer-events: none;
}
#blueprint-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
    opacity: 0.78;
}

/* 暗角遮罩 */
#overlay {
    position: absolute;
    inset: 0;
    z-index: 2;
    /* background 由 JS 根据 overlayDirection 动态注入 */
}

/* 噪点纹理 */
#noise {
    position: absolute; inset: 0;
    z-index: 6;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
    pointer-events: none;
}

/* ─── 中层装饰（蓝图线框 /  architecture schematic，非手机） ─── */
#hero-deco {
    position: absolute;
    left: 50%;
    top: 53%;
    width: 500px;
    height: 860px;
    margin-left: -250px;
    margin-top: -430px;
    z-index: 7;
    pointer-events: none;
}
#hero-deco svg {
    width: 100%;
    height: 100%;
    display: block;
}

/* ─── 顶部品牌栏 ─── */
#header {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 76px 76px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 20;
}

#tagline {
    font-size: 30px;
    font-weight: 400;
    color: rgba(255,255,255,0.55);
    letter-spacing: 6px;
}

#brand {
    display: flex;
    align-items: center;
    gap: 16px;
}

#brand-name {
    font-size: 30px;
    font-weight: 600;
    color: rgba(255,255,255,0.80);
    letter-spacing: 3px;
}

#avatar {
    width: 78px; height: 78px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid rgba(255,255,255,0.25);
    display: block;
}

#avatar-fallback {
    width: 78px; height: 78px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.20);
    background: rgba(255,255,255,0.06);
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
}

/* ─── 核心内容区 ─── */
#content {
    position: absolute;
    top: 0; bottom: 0; left: 0; right: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 200px 72px 280px;
    text-align: center;
    z-index: 20;
    gap: 0;
}

/* 小标签 */
#tag {
    display: inline-block;
    font-size: 26px;
    font-weight: 600;
    letter-spacing: 8px;
    padding: 10px 32px;
    border-radius: 100px;
    margin-bottom: 52px;
}

/* ── 主标题 ─── */
#headline {
    font-size: 200px;
    font-weight: 900;
    line-height: 1.0;
    letter-spacing: -4px;
    color: #ffffff;
    text-align: center;
    word-break: keep-all;
}

/* 自适应字号 — 按每行最大 CJK 视觉宽度分档 */
#headline.len5  { font-size: 200px; }                          /* maxLineW ≤4 */
#headline.len6  { font-size: 180px; }                          /* maxLineW ≤5 */
#headline.len7  { font-size: 155px; letter-spacing: -2px; }    /* maxLineW ≤6 */
#headline.len8  { font-size: 130px; letter-spacing: -1px; }    /* maxLineW ≤7 */
#headline.len10 { font-size: 110px; letter-spacing: 0px; }     /* maxLineW ≤9 */
#headline.len12 { font-size: 95px; }                           /* maxLineW ≤11 */
#headline.long  { font-size: 82px;  letter-spacing: 0px; }     /* maxLineW >11 */

/* 强调词 */
#headline em {
    font-style: normal;
}

/* 分割线 */
#divider {
    width: 120px;
    height: 3px;
    border-radius: 2px;
    margin: 44px auto 44px;
}

/* 副标题（tech 下由 JS 覆盖为更高对比） */
#subline {
    font-size: 48px;
    font-weight: 600;
    line-height: 1.55;
    color: rgba(235, 252, 255, 0.96);
    letter-spacing: 3px;
    max-width: 900px;
    text-shadow:
        0 1px 2px rgba(0, 10, 20, 0.95),
        0 2px 16px rgba(0, 0, 0, 0.88),
        0 0 20px rgba(0, 210, 255, 0.22);
}

/* ─── 底部信息条 ─── */
#footer {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 0 76px 60px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 20;
}

#footer-left {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.foot-item {
    display: flex;
    align-items: center;
    gap: 14px;
    font-size: 27px;
    color: rgba(255,255,255,0.38);
    letter-spacing: 2px;
}

.foot-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
}

#watermark {
    font-size: 24px;
    color: rgba(255,255,255,0.22);
    letter-spacing: 3px;
}

/* ─── 底部装饰线 ─── */
#accent-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 5px;
}
</style>
</head>

        headlineColor: "#FFFFFF",
        headlineGlow: "0 1px 0 rgba(0,25,40,0.92), 0 2px 4px rgba(0,10,24,0.95), 0 4px 24px rgba(0,0,0,0.88), 0 0 20px rgba(0,235,255,0.55), 0 0 42px rgba(0,160,255,0.28)",
        accentGrad: "linear-gradient(135deg, #FFFFFF 0%, #D8FFFF 22%, #00F5FF 52%, #0090E8 100%)",
        accentHeadlineFilter: "drop-shadow(0 1px 1px rgba(0,15,28,0.95)) drop-shadow(0 2px 12px rgba(0,0,0,0.75)) drop-shadow(0 0 14px rgba(0,245,255,0.75)) drop-shadow(0 0 36px rgba(0,160,255,0.35))",
        fallbackBg: "radial-gradient(ellipse 115% 90% at 50% 14%, #082038 0%, #051422 42%, #020810 78%)",
        decoGlow:   "rgba(0,230,255,0.22)",

    finance: {

// ── 遮罩渐变 ──
const OVERLAYS = {
    "to-bottom": `linear-gradient(to bottom,
        rgba(2,14,26,0.86) 0%,
        rgba(2,18,32,0.28) 16%,
        rgba(2,12,22,0.02) 34%,
        rgba(2,12,22,0.02) 54%,
        rgba(2,14,26,0.42) 72%,
        rgba(1,8,16,0.93) 100%)`,
    "to-top": `linear-gradient(to top,
        rgba(2,14,26,0.88) 0%,
        rgba(2,18,32,0.34) 18%,
        rgba(2,12,22,0.06) 38%,
        rgba(2,12,22,0.06) 52%,
        rgba(2,14,26,0.48) 72%,
        rgba(1,8,16,0.94) 100%)`,
    "center-out": `radial-gradient(ellipse 100% 80% at 50% 50%,
        rgba(2,12,22,0.06) 0%,
        rgba(2,16,28,0.28) 40%,
        rgba(1,8,16,0.88) 100%)`,
    "to-left": `linear-gradient(to left,
        rgba(2,14,26,0.88) 0%,
        rgba(2,18,32,0.34) 25%,
        rgba(2,12,22,0.06) 50%,
        rgba(2,18,32,0.34) 75%,
        rgba(2,14,26,0.88) 100%)`,
    "to-right": `linear-gradient(to right,
        rgba(2,14,26,0.88) 0%,
        rgba(2,18,32,0.34) 25%,
        rgba(2,12,22,0.06) 50%,
        rgba(2,18,32,0.34) 75%,
        rgba(2,14,26,0.88) 100%)`,
};

(function render() {
    const t = THEMES[CONFIG.theme] || THEMES.tech;

    // ── 背景图 ──
    const bgEl = document.getElementById('bg');
    const blueprintEl = document.getElementById('blueprint-bg');
    if (CONFIG.bgImage) {
        bgEl.src = CONFIG.bgImage;
        bgEl.onerror = () => { bgEl.style.display = 'none'; };
        if (blueprintEl) blueprintEl.style.display = 'none';
    } else {
        bgEl.style.display = 'none';
        if (blueprintEl) blueprintEl.style.display = '';
    }

    // ── 纯CSS备用背景 ──
    document.getElementById('bg-fallback').style.background =
        t.fallbackBg + `, radial-gradient(ellipse 80% 60% at 50% 75%, ${t.glowColor} 0%, transparent 60%), radial-gradient(ellipse 60% 60% at 80% 20%, ${t.glowColor2} 0%, transparent 60%)`;

    // ── 遮罩方向 ──
    const overlayDir = CONFIG.overlayDirection || 'to-bottom';
    document.getElementById('overlay').style.background = OVERLAYS[overlayDir] || OVERLAYS['to-bottom'];

    // ── 噪点 ──
    const noiseEl = document.getElementById('noise');
    if (CONFIG.noiseEnabled === false) {
        noiseEl.style.display = 'none';
    } else {
        const opacity = CONFIG.noiseOpacity != null ? CONFIG.noiseOpacity : 0.05;
        noiseEl.style.opacity = opacity;
    }

    // ── 装饰图形 ──
    const decoEl = document.getElementById('hero-deco');
    const svgContent = CONFIG.decoSVG || DEFAULT_BLUEPRINT_DECO_SVG;
    decoEl.innerHTML = svgContent;
    decoEl.style.opacity = CONFIG.decoOpacity != null ? CONFIG.decoOpacity : 0.82;
    decoEl.style.transform = `rotate(${CONFIG.decoRotate != null ? CONFIG.decoRotate : -8}deg) scale(${CONFIG.decoScale || 1})`;
    decoEl.style.filter = `drop-shadow(0 0 48px ${t.decoGlow}) drop-shadow(0 28px 64px rgba(0,0,0,0.5))`;

    // ── 头像 ──
    const avatarFallback = document.getElementById('avatar-fallback');
    if (CONFIG.avatarImage) {
        document.getElementById('avatar').src = CONFIG.avatarImage;
        avatarFallback.style.display = 'none';
    } else {
        document.getElementById('avatar').style.display = 'none';
        avatarFallback.textContent = CONFIG.avatarEmoji || '🐶';
    }

    // ── 品牌栏 ──
    const taglineEl = document.getElementById('tagline');
    const brandNameEl = document.getElementById('brand-name');
    taglineEl.textContent = CONFIG.tagline;
    brandNameEl.textContent = CONFIG.brandName;
    if (t.headerMuted) taglineEl.style.color = t.headerMuted;
    brandNameEl.style.textShadow = t.headerBrandShadow || 'none';
    if (t.headerBrand) brandNameEl.style.color = t.headerBrand;

    // ── 标签 ──
    const tagEl = document.getElementById('tag');
    tagEl.textContent = CONFIG.tag;
    tagEl.style.cssText += `background:${t.tagBg}; border:1.5px solid ${t.tagBorder}; color:${t.tagColor};`;
    if (t.tagTextShadow) tagEl.style.textShadow = t.tagTextShadow;

    // ── 副标题（对比度） ──
    const subEl = document.getElementById('subline');
    if (t.sublineColor) subEl.style.color = t.sublineColor;
    if (t.sublineShadow) subEl.style.textShadow = t.sublineShadow;

    // ── 主标题 ──
    const headEl = document.getElementById('headline');
    const lines = CONFIG.headline.split('\n');

    // CJK 视觉宽度：CJK/fullwidth = 1，ASCII = 0.55
    function cjkWidth(s) {
        let w = 0;
        for (const c of s) {
            w += /[\u4e00-\u9fff\u3000-\u303f\uff00-\uffef]/.test(c) ? 1 : 0.55;
        }
        return Math.round(w);
    }
    const maxLineW = Math.max(...lines.map(l => cjkWidth(l)));

    // 按每行最大视觉宽度分档，确保单行不溢出（可用宽度 936px）
    const cls = maxLineW <= 4 ? 'len5'
              : maxLineW <= 5 ? 'len6'
              : maxLineW <= 6 ? 'len7'
              : maxLineW <= 7 ? 'len8'
              : maxLineW <= 9 ? 'len10'
              : maxLineW <= 11 ? 'len12' : 'long';
    headEl.classList.add(cls);
    headEl.style.textShadow = t.headlineGlow ? 'none' : t.textGlow;

    headEl.innerHTML = lines.map((line, i) => {
        if (CONFIG.accentLine === i + 1) {
            const fd = t.accentHeadlineFilter ? `filter:${t.accentHeadlineFilter};` : '';
            return `<em style="background:${t.accentGrad};-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;${fd}">${line}</em>`;
        }
        const lc = t.headlineColor ? `color:${t.headlineColor};` : '';
        const lg = t.headlineGlow ? `text-shadow:${t.headlineGlow};` : '';
        return `<span style="${lc}${lg}">${line}</span>`;
    }).join('<br>');

    // ── 分割线 ──
    document.getElementById('divider').style.background = t.accentGrad;

    subEl.textContent = CONFIG.subline;

    // ── 底部项目 ──
    const footLeft = document.getElementById('footer-left');
    footLeft.innerHTML = '';
    (CONFIG.footerItems || []).forEach(item => {
        const div = document.createElement('div');
        div.className = 'foot-item';
        if (t.footerItemColor) div.style.color = t.footerItemColor;
        div.innerHTML = `<div class="foot-dot" style="background:${t.dotColor};box-shadow:0 0 8px ${t.dotColor}"></div>${item}`;
        footLeft.appendChild(div);
    });

    // ── 水印 & 底线 ──
    const wm = document.getElementById('watermark');
    wm.textContent = CONFIG.watermark;
    if (t.watermarkColor) wm.style.color = t.watermarkColor;
    document.getElementById('accent-bar').style.background = t.bar;
})();
</script>
