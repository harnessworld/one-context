<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>竖版封面 · Agent Harness</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { width: 1080px; height: 1920px; overflow: hidden; font-family: 'Helvetica Neue', 'Microsoft YaHei', 'PingFang SC', sans-serif; background: #05050a; }

#cover { position: relative; width: 1080px; height: 1920px; overflow: hidden; }
#bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: center 30%; }
#bg-fallback { position: absolute; inset: 0; }
#overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(3,3,8,0.82) 0%, rgba(3,3,8,0.30) 18%, rgba(3,3,8,0.08) 38%, rgba(3,3,8,0.08) 52%, rgba(3,3,8,0.45) 72%, rgba(3,3,8,0.92) 100%); }
#noise { position: absolute; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E"); pointer-events: none; }

/* orb 光晕 */
.orb { position: absolute; border-radius: 50%; pointer-events: none; filter: blur(80px); }
#orb1 { width: 400px; height: 400px; background: radial-gradient(circle,rgba(99,102,241,0.20),transparent 70%); top: 10%; left: -100px; }
#orb2 { width: 300px; height: 300px; background: radial-gradient(circle,rgba(56,189,248,0.15),transparent 70%); bottom: 20%; right: -50px; }
#orb3 { width: 250px; height: 250px; background: radial-gradient(circle,rgba(52,211,153,0.12),transparent 70%); top: 40%; right: 10%; }

#header { position: absolute; top: 0; left: 0; right: 0; padding: 76px 76px 0; display: flex; justify-content: space-between; align-items: center; z-index: 20; }
#tagline { font-size: 30px; font-weight: 400; color: rgba(255,255,255,0.55); letter-spacing: 6px; }
#brand { display: flex; align-items: center; gap: 16px; }
#brand-name { font-size: 30px; font-weight: 600; color: rgba(255,255,255,0.80); letter-spacing: 3px; }
#avatar { width: 78px; height: 78px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255,255,255,0.25); display: block; }
#avatar-fallback { width: 78px; height: 78px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.20); background: rgba(255,255,255,0.06); display: flex; align-items: center; justify-content: center; font-size: 36px; }

#content { position: absolute; top: 0; bottom: 0; left: 0; right: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 200px 72px 280px; text-align: center; z-index: 20; gap: 0; }
#tag { display: inline-block; font-size: 26px; font-weight: 600; letter-spacing: 8px; padding: 10px 32px; border-radius: 100px; margin-bottom: 52px; }

#headline { font-family: 'Noto Serif SC', 'Source Han Serif SC', 'STKaiti', 'KaiTi', 'SimSun', serif; font-size: 200px; font-weight: 900; line-height: 1.0; letter-spacing: 4px; color: #ffffff; text-align: center; word-break: keep-all; }
#headline.len6 { font-size: 180px; }
#headline em { font-style: normal; }

#divider { width: 120px; height: 3px; border-radius: 2px; margin: 44px auto 44px; }
#subline { font-family: 'Noto Serif SC', 'Source Han Serif SC', 'Microsoft YaHei', 'PingFang SC', sans-serif; font-size: 48px; font-weight: 500; line-height: 1.55; color: rgba(255,255,255,0.78); letter-spacing: 2px; max-width: 900px; text-shadow: 0 2px 20px rgba(0,0,0,0.8); }

/* 三卡片 */
#cards { display: flex; gap: 20px; margin-top: 48px; }
.card { background: rgba(15,23,42,0.55); backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 20px 28px; text-align: center; min-width: 160px; }
.card-icon { font-size: 32px; margin-bottom: 10px; }
.card-text { font-size: 26px; font-weight: 700; line-height: 1.35; }

#footer { position: absolute; bottom: 0; left: 0; right: 0; padding: 0 76px 60px; display: flex; justify-content: space-between; align-items: center; z-index: 20; }
#footer-left { display: flex; flex-direction: column; gap: 14px; }
.foot-item { display: flex; align-items: center; gap: 14px; font-size: 30px; color: rgba(255,255,255,0.42); letter-spacing: 2px; }
.foot-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
#watermark { font-size: 24px; color: rgba(255,255,255,0.22); letter-spacing: 3px; }
#accent-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 5px; }
</style>
</head>
<body>
<div id="cover">
    <div class="orb" id="orb1"></div>
    <div class="orb" id="orb2"></div>
    <div class="orb" id="orb3"></div>
    <img id="bg" src="" alt="">
    <div id="bg-fallback"></div>
    <div id="overlay"></div>
    <div id="noise"></div>
    <div id="header">
        <div id="tagline">ANTHROPIC AGENT</div>
        <div id="brand">
            <div id="brand-name">大厂吾师兄</div>
            <img id="avatar" src="" onerror="this.style.display='none'" alt="">
            <div id="avatar-fallback">🐶</div>
        </div>
    </div>
    <div id="content">
        <div id="tag"></div>
        <div id="headline"></div>
        <div id="divider"></div>
        <div id="subline"></div>
        <div id="cards">
            <div class="card"><div class="card-icon">🧠</div><div class="card-text">Harness 无状态大脑</div></div>
            <div class="card"><div class="card-icon">🔄</div><div class="card-text">Agentic 循环</div></div>
            <div class="card"><div class="card-icon">🛡️</div><div class="card-text">Sandbox 隔离执行</div></div>
        </div>
    </div>
    <div id="footer">
        <div id="footer-left"></div>
        <div id="watermark"></div>
    </div>
    <div id="accent-bar"></div>
</div>
<script>
const CONFIG = {
    headline:    "从宠物到牲口",
    accentLine:  1,
    subline:     "Agent Harness · Anthropic 架构革命",
    tag:         "2026 · 技术分享",
    bgImage:     "",
    avatarImage: "",
    footerItems: [],
    watermark:   "",
    theme:       "anthro",
};

const THEMES = {
    anthro: {
        accent:     "#818CF8",
        accent2:    "#38BDF8",
        tagBg:      "rgba(139,92,248,0.12)",
        tagBorder:  "rgba(139,92,248,0.40)",
        tagColor:   "#C4B5FD",
        glowColor:  "rgba(99,102,241,0.25)",
        glowColor2: "rgba(56,189,248,0.15)",
        dotColor:   "#818CF8",
        bar:        "linear-gradient(90deg, transparent 2%, #818CF8 30%, #38BDF8 60%, #34D399 80%, transparent 98%)",
        textGlow:   "0 0 60px rgba(99,102,241,0.35), 0 4px 30px rgba(0,0,0,0.9)",
        accentGrad: "linear-gradient(135deg, #818CF8 0%, #6366F1 30%, #38BDF8 55%, #34D399 78%, #F0C14A 100%)",
        fallbackBg: "radial-gradient(ellipse 100% 70% at 30% 50%, #0a1628 0%, #030712 40%, #050210 100%)",
        cardColor:  "#C4B5FD",
        cardColor2: "#7DD3FC",
        cardColor3: "#6EE7B7",
    },
};

(function render() {
    const t = THEMES[CONFIG.theme] || THEMES.anthro;
    const bgEl = document.getElementById('bg');
    if (CONFIG.bgImage) { bgEl.src = CONFIG.bgImage; bgEl.onerror = () => { bgEl.style.display = 'none'; }; }
    else { bgEl.style.display = 'none'; }
    document.getElementById('bg-fallback').style.background = t.fallbackBg + `, radial-gradient(ellipse 60% 70% at 70% 50%, ${t.glowColor} 0%, transparent 60%), radial-gradient(ellipse 50% 60% at 20% 30%, ${t.glowColor2} 0%, transparent 60%)`;
    if (CONFIG.avatarImage) { document.getElementById('avatar').src = CONFIG.avatarImage; document.getElementById('avatar-fallback').style.display = 'none'; }
    else { document.getElementById('avatar').style.display = 'none'; }

    const tagEl = document.getElementById('tag');
    tagEl.textContent = CONFIG.tag;
    tagEl.style.cssText += `background:${t.tagBg}; border:1.5px solid ${t.tagBorder}; color:${t.tagColor};`;

    const headEl = document.getElementById('headline');
    const totalChars = CONFIG.headline.replace(/\n/g, '').length;
    const cls = totalChars <= 6 ? 'len6' : '';
    headEl.classList.add(cls);
    headEl.style.textShadow = t.textGlow;
    headEl.innerHTML = `<em style="background:${t.accentGrad}; -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;">${CONFIG.headline}</em>`;

    document.getElementById('divider').style.background = t.accentGrad;
    document.getElementById('subline').textContent = CONFIG.subline;

    const cards = document.querySelectorAll('.card-text');
    if (cards[0]) cards[0].style.color = t.cardColor;
    if (cards[1]) cards[1].style.color = t.cardColor2;
    if (cards[2]) cards[2].style.color = t.cardColor3;

    const footLeft = document.getElementById('footer-left');
    (CONFIG.footerItems || []).forEach(item => {
        const div = document.createElement('div');
        div.className = 'foot-item';
        div.innerHTML = `<div class="foot-dot" style="background:${t.dotColor};box-shadow:0 0 6px ${t.dotColor}"></div>${item}`;
        footLeft.appendChild(div);
    });

    const wEl = document.getElementById('watermark');
    if (CONFIG.watermark) { wEl.textContent = CONFIG.watermark; wEl.style.display = ''; }
    else { wEl.style.display = 'none'; }
    document.getElementById('accent-bar').style.background = t.bar;
})();
</script>
</body>
</html>
