<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>封面</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    font-family: 'Helvetica Neue', 'Microsoft YaHei', 'PingFang SC', sans-serif;
    background: #05050a;
}

#cover {
    position: relative;
    width: 1080px;
    height: 1920px;
    overflow: hidden;
}

/* ─── 背景层 ─── */
#bg {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center 30%;
}

/* 纯CSS备用背景（无背景图时展示） */
#bg-fallback {
    position: absolute;
    inset: 0;
    z-index: 0;
}

/* 多层「文件」插画背景（酷炫叠放） */
#file-art {
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    overflow: hidden;
}
#file-art svg {
    position: absolute;
    left: 50%;
    top: 42%;
    width: 120%;
    height: 85%;
    transform: translate(-50%, -50%);
    filter: drop-shadow(0 0 40px rgba(0, 240, 255, 0.15)) drop-shadow(0 0 80px rgba(180, 80, 255, 0.12));
}

/* 暗角遮罩 */
#overlay {
    position: absolute;
    inset: 0;
    z-index: 2;
    /* background 由 JS 根据 overlayDirection 动态注入 */
}

/* 噪点纹理 */
#noise {
    position: absolute; inset: 0;
    z-index: 8;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
    pointer-events: none;
}

/* ─── 装饰图形 ─── */
#phone-deco {
    position: absolute;
    left: 50%;
    top: 52%;
    width: 520px;
    height: 990px;
    margin-left: -260px;
    margin-top: -495px;
    z-index: 4;
    pointer-events: none;
}
#phone-deco svg {
    width: 100%;
    height: 100%;
    display: block;
}

/* ─── 顶部品牌栏 ─── */
#header {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 76px 76px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 22;
}

#tagline {
    font-size: 30px;
    font-weight: 400;
    color: rgba(255,255,255,0.55);
    letter-spacing: 6px;
}

#brand {
    display: flex;
    align-items: center;
    gap: 16px;
}

#brand-name {
    font-size: 30px;
    font-weight: 600;
    color: rgba(255,255,255,0.80);
    letter-spacing: 3px;
}

#avatar {
    width: 78px; height: 78px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid rgba(255,255,255,0.25);
    display: block;
}

#avatar-fallback {
    width: 78px; height: 78px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.20);
    background: rgba(255,255,255,0.06);
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
}

/* ─── 核心内容区 ─── */
#content {
    position: absolute;
    top: 0; bottom: 0; left: 0; right: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 200px 72px 280px;
    text-align: center;
    z-index: 22;
    gap: 0;
}

/* 小标签 */
#tag {
    display: inline-block;
    font-size: 26px;
    font-weight: 600;
    letter-spacing: 8px;
    padding: 10px 32px;
    border-radius: 100px;
    margin-bottom: 52px;
}

/* ── 主标题 ─── */
#headline {
    font-size: 200px;
    font-weight: 900;
    line-height: 1.0;
    letter-spacing: -4px;
    color: #ffffff;
    text-align: center;
    word-break: keep-all;
}

/* 自适应字号 — 按每行最大 CJK 视觉宽度分档 */
#headline.len5  { font-size: 200px; }                          /* maxLineW ≤4 */
#headline.len6  { font-size: 180px; }                          /* maxLineW ≤5 */
#headline.len7  { font-size: 155px; letter-spacing: -2px; }    /* maxLineW ≤6 */
#headline.len8  { font-size: 130px; letter-spacing: -1px; }    /* maxLineW ≤7 */
#headline.len10 { font-size: 110px; letter-spacing: 0px; }     /* maxLineW ≤9 */
#headline.len12 { font-size: 95px; }                           /* maxLineW ≤11 */
#headline.long  { font-size: 82px;  letter-spacing: 0px; }     /* maxLineW >11 */

/* 强调词（模板主题渐变） */
#headline em {
    font-style: normal;
}

#headline > span:not(.hx) {
    color: rgba(255, 255, 255, 0.96);
    text-shadow: 0 4px 28px rgba(0, 0, 0, 0.9), 0 0 40px rgba(0, 200, 255, 0.12);
}

/* 炫彩重点字：流动彩虹 */
#headline .hx {
    font-style: normal;
    background: linear-gradient(
        105deg,
        #ff00aa 0%,
        #ff6b00 14%,
        #ffd000 28%,
        #00ff88 42%,
        #00d4ff 56%,
        #a855f7 70%,
        #ff00aa 100%
    );
    background-size: 220% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: hx-flow 3.2s ease-in-out infinite;
    text-shadow: none !important;
    filter: drop-shadow(0 0 22px rgba(0, 255, 200, 0.35)) drop-shadow(0 0 36px rgba(168, 85, 247, 0.25));
}
@keyframes hx-flow {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
}

/* 分割线 */
#divider {
    width: 120px;
    height: 3px;
    border-radius: 2px;
    margin: 44px auto 44px;
}

/* 副标题 */
#subline {
    font-size: 48px;
    font-weight: 500;
    line-height: 1.55;
    color: rgba(255,255,255,0.75);
    letter-spacing: 3px;
    max-width: 900px;
    text-shadow: 0 2px 20px rgba(0,0,0,0.8);
}

/* ─── 底部信息条 ─── */
#footer {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 0 76px 60px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 22;
}

#footer-left {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.foot-item {
    display: flex;
    align-items: center;
    gap: 14px;
    font-size: 27px;
    color: rgba(255,255,255,0.38);
    letter-spacing: 2px;
}

.foot-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
}

#watermark {
    font-size: 24px;
    color: rgba(255,255,255,0.22);
    letter-spacing: 3px;
}

/* 本封面：让文件插画更透出来 */
#cover.cover-files #overlay {
    background: linear-gradient(to bottom,
        rgba(3, 5, 14, 0.88) 0%,
        rgba(3, 5, 14, 0.38) 24%,
        rgba(3, 5, 14, 0.14) 48%,
        rgba(3, 5, 14, 0.22) 72%,
        rgba(3, 5, 14, 0.92) 100%) !important;
}

#accent-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 5px;
    z-index: 24;
}
</style>
</head>

        rgba(3,3,8,0.30) 75%,
        rgba(3,3,8,0.82) 100%)`,
    "to-right": `linear-gradient(to right,
        rgba(3,3,8,0.82) 0%,
        rgba(3,3,8,0.30) 25%,
        rgba(3,3,8,0.08) 50%,
        rgba(3,3,8,0.30) 75%,
        rgba(3,3,8,0.82) 100%)`,
};

(function render() {
    const t = THEMES[CONFIG.theme] || THEMES.tech;

    // ── 背景图 ──
    const bgEl = document.getElementById('bg');
    if (CONFIG.bgImage) {
        bgEl.src = CONFIG.bgImage;
        bgEl.onerror = () => { bgEl.style.display = 'none'; };
    } else {
        bgEl.style.display = 'none';
    }

    // ── 纯CSS备用背景 ──
    document.getElementById('bg-fallback').style.background =
        t.fallbackBg + `, radial-gradient(ellipse 80% 60% at 50% 75%, ${t.glowColor} 0%, transparent 60%), radial-gradient(ellipse 60% 60% at 80% 20%, ${t.glowColor2} 0%, transparent 60%)`;

    // ── 遮罩方向 ──
    const overlayDir = CONFIG.overlayDirection || 'to-bottom';
    document.getElementById('overlay').style.background = OVERLAYS[overlayDir] || OVERLAYS['to-bottom'];

    // ── 噪点 ──
    const noiseEl = document.getElementById('noise');
    if (CONFIG.noiseEnabled === false) {
        noiseEl.style.display = 'none';
    } else {
        const opacity = CONFIG.noiseOpacity != null ? CONFIG.noiseOpacity : 0.05;
        noiseEl.style.opacity = opacity;
    }

    // ── 装饰图形 ──
    const decoEl = document.getElementById('phone-deco');
    const svgContent = CONFIG.decoSVG || DEFAULT_PHONE_SVG;
    decoEl.innerHTML = svgContent;
    decoEl.style.opacity = CONFIG.decoOpacity != null ? CONFIG.decoOpacity : 0.82;
    decoEl.style.transform = `rotate(${CONFIG.decoRotate != null ? CONFIG.decoRotate : -11}deg) scale(${CONFIG.decoScale || 1})`;
    decoEl.style.filter = `drop-shadow(0 0 100px ${t.decoGlow}) drop-shadow(0 40px 100px rgba(0,0,0,0.45))`;

    // ── 头像 ──
    const avatarFallback = document.getElementById('avatar-fallback');
    if (CONFIG.avatarImage) {
        document.getElementById('avatar').src = CONFIG.avatarImage;
        avatarFallback.style.display = 'none';
    } else {
        document.getElementById('avatar').style.display = 'none';
        avatarFallback.textContent = CONFIG.avatarEmoji || '🐶';
    }

    // ── 品牌栏 ──
    document.getElementById('tagline').textContent = CONFIG.tagline;
    document.getElementById('brand-name').textContent = CONFIG.brandName;

    // ── 标签 ──
    const tagEl = document.getElementById('tag');
    tagEl.textContent = CONFIG.tag;
    tagEl.style.cssText += `background:${t.tagBg}; border:1.5px solid ${t.tagBorder}; color:${t.tagColor};`;

    // ── 主标题 ──
    const headEl = document.getElementById('headline');
    headEl.className = '';

    function cjkWidth(s) {
        let w = 0;
        for (const c of s) {
            w += /[\u4e00-\u9fff\u3000-\u303f\uff00-\uffef]/.test(c) ? 1 : 0.55;
        }
        return Math.round(w);
    }

    if (CONFIG.headlineHTML) {
        headEl.classList.add('len7');
        headEl.style.textShadow = 'none';
        headEl.innerHTML = CONFIG.headlineHTML;
    } else {
        const lines = CONFIG.headline.split('\n');
        const maxLineW = Math.max(...lines.map(l => cjkWidth(l)));
        const cls = maxLineW <= 4 ? 'len5'
                  : maxLineW <= 5 ? 'len6'
                  : maxLineW <= 6 ? 'len7'
                  : maxLineW <= 7 ? 'len8'
                  : maxLineW <= 9 ? 'len10'
                  : maxLineW <= 11 ? 'len12' : 'long';
        headEl.classList.add(cls);
        headEl.style.textShadow = t.textGlow;
        headEl.innerHTML = lines.map((line, i) => {
            if (CONFIG.accentLine === i + 1) {
                return `<em style="background:${t.accentGrad}; -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;">${line}</em>`;
            }
            return `<span>${line}</span>`;
        }).join('<br>');
    }

    // ── 分割线 ──
    document.getElementById('divider').style.background =
        'linear-gradient(90deg, #ff00aa, #ff6b00, #00ff88, #00d4ff, #a855f7, #ff00aa)';
    document.getElementById('divider').style.backgroundSize = '200% 100%';

    // ── 副标题 ──
    document.getElementById('subline').textContent = CONFIG.subline;

    // ── 底部项目 ──
    const footLeft = document.getElementById('footer-left');
    (CONFIG.footerItems || []).forEach(item => {
        const div = document.createElement('div');
        div.className = 'foot-item';
        div.innerHTML = `<div class="foot-dot" style="background:${t.dotColor};box-shadow:0 0 6px ${t.dotColor}"></div>${item}`;
        footLeft.appendChild(div);
    });

    // ── 水印 & 底线 ──
    document.getElementById('watermark').textContent = CONFIG.watermark;
    document.getElementById('accent-bar').style.background = t.bar;
})();
</script>
</body>
</html>
