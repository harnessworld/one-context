<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script>
    const CONFIG = {
      title: 'AI 基础设施 2026',
      subtitle: '大规模推理引擎架构实践',
      badge: 'AI INFRA',
      description: '从推理性能优化到大规模调度，探索下一代 AI 基础设施核心技术',
      pills: [
        { emoji: '⚡', title: '低延迟', subtitle: '推理优化' },
        { emoji: '🔧', title: 'vLLM', subtitle: '推理框架' },
        { emoji: '📊', title: 'GPU', subtitle: '异构算力' },
      ],
      source: 'AI INFRASTRUCTURE 2026',
      theme: 'tech',
    };
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0a0f;
      --fg: #f0f0f5;
      --muted: #7a7a8a;
      --accent-a: #6366f1;
      --accent-b: #06b6d4;
    }
    body {
      width: 1440px;
      height: 1080px;
      background: var(--bg);
      color: var(--fg);
      font-family: system-ui, sans-serif;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      padding: 64px 80px;
    }
    .orb-1 {
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(99,102,241,.15), transparent 70%);
      top: -150px;
      right: -100px;
      border-radius: 50%;
    }
    .orb-2 {
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(6,182,212,.12), transparent 70%);
      bottom: -100px;
      left: -80px;
      border-radius: 50%;
    }
    .orb-3 {
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(34,197,94,.08), transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      z-index: 0;
    }
    /* Geometric decoration */
    .geo-ring {
      position: absolute;
      border: 1px solid rgba(99,102,241,.1);
      border-radius: 50%;
      z-index: 0;
    }
    .geo-ring-1 {
      width: 300px;
      height: 300px;
      top: 80px;
      right: 280px;
    }
    .geo-ring-2 {
      width: 200px;
      height: 200px;
      bottom: 120px;
      left: 200px;
      border-color: rgba(6,182,212,.08);
    }
    /* Grid lines decoration */
    .grid-line {
      position: absolute;
      background: linear-gradient(90deg, transparent, rgba(99,102,241,.06), transparent);
      z-index: 0;
    }
    .grid-line-1 {
      width: 100%;
      height: 1px;
      top: 200px;
      left: 0;
    }
    .grid-line-2 {
      width: 100%;
      height: 1px;
      bottom: 200px;
      left: 0;
    }
    .grid-line-3 {
      width: 1px;
      height: 100%;
      left: 500px;
      top: 0;
      background: linear-gradient(180deg, transparent, rgba(6,182,212,.06), transparent);
    }
    .main {
      display: flex;
      flex: 1;
      gap: 60px;
      position: relative;
      z-index: 2;
    }
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 16px;
    }
    .badge {
      font-size: 22px;
      padding: 8px 24px;
      background: linear-gradient(135deg, rgba(99,102,241,.2), rgba(6,182,212,.2));
      border-radius: 32px;
      color: var(--accent-b);
      width: fit-content;
    }
    .title {
      font-size: 110px;
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: -3px;
      background: linear-gradient(135deg, var(--accent-a) 0%, var(--accent-b) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      font-size: 44px;
      font-weight: 700;
      color: var(--fg);
      letter-spacing: 1px;
    }
    .desc {
      font-size: 28px;
      color: var(--muted);
      max-width: 700px;
      line-height: 1.5;
    }
    .pills {
      width: 380px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .pill {
      background: rgba(255,255,255,.05);
      border-radius: 16px;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .pill-emoji {
      font-size: 36px;
    }
    .pill-content {
      flex: 1;
    }
    .pill-title {
      font-size: 32px;
      font-weight: 700;
      color: var(--accent-b);
    }
    .pill-sub {
      font-size: 24px;
      color: var(--muted);
    }
    .source {
      position: absolute;
      bottom: 40px;
      left: 80px;
      font-size: 20px;
      color: rgba(255,255,255,.25);
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <!-- 光晕装饰 -->
  <div class="orb-1"></div>
  <div class="orb-2"></div>
  <div class="orb-3"></div>

  <!-- 几何装饰 -->
  <div class="geo-ring geo-ring-1"></div>
  <div class="geo-ring geo-ring-2"></div>

  <!-- 网格线装饰 -->
  <div class="grid-line grid-line-1"></div>
  <div class="grid-line grid-line-2"></div>
  <div class="grid-line grid-line-3"></div>

  <div class="main">
    <div class="hero">
      <div class="badge">AI INFRA</div>
      <div class="title">AI 基础设施 2026</div>
      <div class="subtitle">大规模推理引擎架构实践</div>
      <div class="desc">从推理性能优化到大规模调度，探索下一代 AI 基础设施核心技术</div>
    </div>
    <div class="pills">
      <div class="pill">
        <div class="pill-emoji">⚡</div>
        <div class="pill-content">
          <div class="pill-title">低延迟</div>
          <div class="pill-sub">推理优化</div>
        </div>
      </div>
      <div class="pill">
        <div class="pill-emoji">🔧</div>
        <div class="pill-content">
          <div class="pill-title">vLLM</div>
          <div class="pill-sub">推理框架</div>
        </div>
      </div>
      <div class="pill">
        <div class="pill-emoji">📊</div>
        <div class="pill-content">
          <div class="pill-title">GPU</div>
          <div class="pill-sub">异构算力</div>
        </div>
      </div>
    </div>
  </div>

  <div class="source">SOURCE: AI INFRASTRUCTURE 2026</div>
</body>
</html>
