# Sub-repository manifest (single source of truth for humans + tooling).
#
# Related manifests (cross-reference by stable repo `id`):
#   meta/workspaces.yaml  — task/theme workspaces list `repos` by id here
#   meta/profiles.yaml    — shared AI/runtime profiles referenced by workspaces
#
# Sync:
#   pip install -e ./packages/one-context && onecxt sync   # or: python -m one_context sync
#   # or: python scripts/sync_repos.py
#
# Fields:
#   url         — Git remote (required)
#   category    — Subfolder under repos/ when path is omitted (required unless path is set)
#   path        — Relative path from one-context repository root; default: repos/<category>/<repo_name>
#                 repo_name is taken from the last segment of the URL (GitHub name, case preserved)
#   id          — Stable id for CLI; default: repo_name from URL
#   alias       — Optional string or list of strings; extra names for sync_repos.py
#   description — Shown to humans / AI; keep concise

version: 1

# Empty registry is valid for a fresh checkout; add entries below.
# Example (develop):
#   - url: git@test.local:your-org/your-repo
#     category: develop
#     alias: yr
#     description: Your project description here.
# Example (research):
#   - url: git@test.local:your-org/research-notes
#     category: research
#     description: Research notes and documentation.
repos:
  - url: https://github.com/CarmanMS/FunctionCanvas
    category: develop
    description: FunctionCanvas
  - url: https://github.com/CarmanMS/VideoFactory
    category: develop
    description: VideoFactory
  - url: https://github.com/CarmanMS/paperwork
    category: research
    description: paperwork
  - url: https://github.com/CarmanMS/hangprofile
    category: develop
    description: Student learning & growth archive (课内/课外/原始材料/归纳); AI-friendly folder layout.
  - url: https://github.com/VoltAgent/awesome-design-md
    path: external/awesome-design-md
    id: awesome-design-md
    alias: awesome-design
    description: Curated DESIGN.md design-system snippets for agent-driven UI (reference only).
  - url: https://github.com/shanraisshan/claude-code-best-practice.git
    path: external/claude-code-best-practice
    id: claude-code-best-practice
    alias: ccbp
    description: Claude Code workflow demos (slash commands, agents, skills, development-workflows); local reference only, not bundled.
