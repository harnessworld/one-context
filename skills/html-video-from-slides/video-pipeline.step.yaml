          - **必须自主创作**：上方示例 JSON 仅供参考字段结构，svg_deco 必须根据当前主题自主设计和生成，禁止照搬任何示例图形
          - 不需要 CSS 动画，纯静态 SVG

        输出要求（严格遵守）：
        - 只输出一个 JSON 对象，不要 markdown 代码围栏(```json)
