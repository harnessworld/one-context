  # ─────────────── Step 14: 确定性 ───────────────
  - id: 14
    name: 封面注入与渲染
    type: script
    status: pending
    config:
      command: |
        #!/usr/bin/env python3
        import os, sys, json, subprocess, re, shutil
        from pathlib import Path

        STATE_FILE = Path(os.environ.get("STEP_STATE", ".step/video-pipeline/state.json"))
        with open(STATE_FILE, "r", encoding="utf-8") as f:
            state = json.load(f)
        PROJECT_DIR = Path(state["project_dir"]).resolve()
        SKILL_DIR = Path(state["skill_dir"]).resolve()
        HTML_DECK = PROJECT_DIR / "html-deck"
        HTML_DECK.mkdir(parents=True, exist_ok=True)

        # 读取 AI 生成的 cover_design.json
        src = Path(".step/video-pipeline/outputs/step-13.txt")
        if not src.exists():
            print("[ERROR] 未找到 AI 生成的封面设计")
            sys.exit(1)
        raw = src.read_text(encoding="utf-8")

        # 提取 JSON（兼容可能的 markdown 围栏）
        design = {}
        m = re.search(r'\{.*\}', raw, re.DOTALL)
        if m:
            try:
                design = json.loads(m.group(0))
            except json.JSONDecodeError as e:
                print(f"[ERROR] JSON 解析失败: {e}")
                print("--- 原始输出前 800 字符 ---")
                print(raw[:800])
                sys.exit(1)
        else:
            print("[ERROR] 无法从 reasoning 输出中提取 JSON")
            sys.exit(1)

        action = design.get("action", "generate")

        if action == "copy":
            from_v = Path(design["from"])
            shutil.copy(from_v, HTML_DECK / "cover.html")
            print(f"[OK] 用户自定义封面已复制到 {HTML_DECK / 'cover.html'}")
            if design.get("from_h"):
                shutil.copy(Path(design["from_h"]), HTML_DECK / "cover_h.html")
        else:
            # 读取参考模板（完整 15K，不走 reasoning 截断）
            template_path = Path(design.get("template_path", "/Users/superno/Documents/code/creative/one-context/features/content-pipeline/short-video-reporting-paradigm/production/html-deck/cover.html"))
            if not template_path.exists():
                print("[ERROR] 未找到参考模板")
                sys.exit(1)
            template = template_path.read_text(encoding="utf-8")

            cfg = design.get("config", {})

            # --- 替换 CONFIG 对象 ---
            hl = cfg.get("headline", "").replace('"', '\\"').replace('\n', '\\n')
            sl = cfg.get("subline", "").replace('"', '\\"').replace('\n', '\\n')
            tg = cfg.get("tag", "").replace('"', '\\"').replace('\n', '\\n')
            wm = cfg.get("watermark", "").replace('"', '\\"').replace('\n', '\\n')
            fi = json.dumps(cfg.get("footerItems", []), ensure_ascii=False)
            config_new = (
                "const CONFIG = {\n"
                f'    headline:    "{hl}",\n'
                f'    accentLine:  {cfg.get("accentLine", 0)},\n'
                f'    subline:     "{sl}",\n'
                f'    tag:         "{tg}",\n'
                '    bgImage:     "",\n'
                '    avatarImage: "",\n'
                f'    footerItems: {fi},\n'
                f'    watermark:   "{wm}",\n'
                f'    theme:       "{cfg.get("theme", "tech")}",\n'
                "};"
            )
            template = re.sub(r'const CONFIG = \{[\s\S]*?\};', lambda m: config_new, template, count=1)

            # --- 替换装饰 SVG ---
            svg_deco = cfg.get("svg_deco", "")
            if svg_deco:
                # 只替换 <div id="phone-deco"> 内部的 <svg>...</svg>
                template = re.sub(
                    r'(<div id="phone-deco"[^>]*>)\s*<svg[\s\S]*?</svg>\s*(</div>)',
                    lambda m: m.group(1) + '\n        ' + svg_deco + '\n    ' + m.group(2),
                    template,
                    count=1
                )
                print(f"[OK] 装饰 SVG 已注入 ({len(svg_deco)} 字符)")

            # --- 扩大装饰容器，让图形接近画布宽度 ---
            template = re.sub(r'width:\s*520px;', 'width: 1000px;', template, count=1)
            template = re.sub(r'height:\s*990px;', 'height: 1000px;', template, count=1)
            template = re.sub(r'margin-left:\s*-260px;', 'margin-left: -500px;', template, count=1)
            template = re.sub(r'margin-top:\s*-495px;', 'margin-top: -500px;', template, count=1)
            template = re.sub(r'top:\s*52%;', 'top: 55%;', template, count=1)
            print("[OK] 装饰容器已放大至 1000×1000")

            cover_path = HTML_DECK / "cover.html"
            cover_path.write_text(template, encoding="utf-8")
            print(f"[OK] cover.html 已写入 ({len(template)} 字符)")

        # --- 渲染 ---
        cover_h = HTML_DECK / "cover_h.html"
        args = ["node", str(SKILL_DIR / "cli.js"), "cover", "--project", str(HTML_DECK)]
        if cover_h.exists():
            args.append("--horizontal")

        print(f"[RUN] {' '.join(args)}")
        result = subprocess.run(args, capture_output=True, text=True)
        print(result.stdout)
        if result.stderr:
            print("[STDERR]", result.stderr)
        if result.returncode != 0:
            print(f"[WARN] 封面渲染失败,退出码 {result.returncode}")
        else:
            print("[OK] 封面渲染完成")
      timeout: 120
    output_file: outputs/step-14.txt

  # ─────────────── Step 15: 确定性 ───────────────
  - id: 15
    name: 最终检查与产出汇总
    type: script
    status: pending
    config:
      command: |
        #!/usr/bin/env python3
        import os, json, subprocess
        from pathlib import Path

        STATE_FILE = Path(os.environ.get("STEP_STATE", ".step/video-pipeline/state.json"))
        with open(STATE_FILE, "r", encoding="utf-8") as f:
            state = json.load(f)

        PROJECT_DIR = Path(state["project_dir"]).resolve()
        dur_file = PROJECT_DIR / "wav-durations.json"
        with open(dur_file, "r", encoding="utf-8") as f:
            dur = json.load(f)

        mp4 = PROJECT_DIR / dur.get("outputFile", "final.mp4")
        # 封面统一约定: html-deck/videos/
        cover_v = PROJECT_DIR / "html-deck" / "videos" / "cover.png"
        cover_h = PROJECT_DIR / "html-deck" / "videos" / "cover_h.png"

        if mp4.exists():
            ff = subprocess.run(
                ["ffprobe", "-v", "error", "-show_entries", "format=duration:stream=width,height",
                 "-of", "json", str(mp4)],
                capture_output=True, text=True
            )
            info = json.loads(ff.stdout) if ff.returncode == 0 else {}
            duration = float(info.get("format", {}).get("duration", 0))
            streams = info.get("streams", [])
            w = streams[0].get("width") if streams else None
            h = streams[0].get("height") if streams else None
        else:
            duration, w, h = 0, None, None

        print("=" * 50)
        print("视频制作流水线完成")
        print("=" * 50)
        print(f"输出目录: {PROJECT_DIR}")
        print(f"MP4:      {mp4.name} ({duration:.1f}s, {w}x{h})")
        if cover_v.exists():
            print(f"封面(竖): {cover_v}")
        if cover_h.exists():
            print(f"封面(横): {cover_h}")
        print("-" * 50)
        print(" artifacts:")
        for f in ["slides/presentation.html", "wav-durations.json", "content-slabs.json", "sub.srt", "html-deck/cover.html"]:
            p = PROJECT_DIR / f
            if p.exists():
                print(f"   ✓ {f}")
            else:
                print(f"   ✗ {f} (缺失)")
        print("=" * 50)

        state["finished"] = True
        with open(STATE_FILE, "w", encoding="utf-8") as f:
            json.dump(state, f, indent=2, ensure_ascii=False)
      timeout: 60
    output_file: outputs/step-15.txt
