# cover-design 冒烟测试
skill_path: "skills/cover-design/SKILL.md"
test_name: "cover-design CONFIG驱动模板冒烟测试"
acceptance_criteria: "生成的 HTML 为单一自包含文件，使用 CONFIG 驱动模板，竖版 1080×1920 比例，包含标题、副标题、装饰图形和主题色系统"

test_cases:
  - id: tc-1
    prompt: "帮我设计一个科技风格的封面，标题是「AI 基础设施 2026」，副标题是「大规模推理引擎架构实践」，使用tech主题"
    description: "测试科技主题封面生成，验证CONFIG驱动"

  - id: tc-2
    prompt: "设计一个增长主题的封面，标题「突破\n瓶颈」，第1行高亮，使用火箭装饰图案"
    description: "测试growth主题 + accentLine + decoSVG组合"

  - id: tc-3
    prompt: "设计封面，关闭噪点纹理，使用中心向外的遮罩方向，金融主题"
    description: "测试noiseEnabled=false + overlayDirection=center-out + finance主题"